<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveGrid — Multi-Stream Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0e;
    --surface: #0f1218;
    --surface2: #161b24;
    --border: #1e2533;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --text: #e8edf5;
    --muted: #4a5568;
    --live: #ff3d71;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */
  header { display: flex; align-items: center; gap: 16px; padding: 8px 14px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; flex-wrap: wrap; }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); white-space: nowrap; }
  .logo span { color: var(--accent); }
  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex: 1; }
  label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  select, input[type="text"] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: var(--radius); font-family: 'Space Mono', monospace; font-size: 11px; outline: none; cursor: pointer; transition: border-color .2s; }
  select:hover, input:hover, select:focus, input:focus { border-color: var(--accent); }
  input[type="text"] { width: 120px; }
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: var(--radius); font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: .5px; cursor: pointer; border: none; transition: all .2s; text-transform: uppercase; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #33ecff; }
  .btn-danger { background: transparent; border: 1px solid var(--accent2); color: var(--accent2); }
  .btn-danger:hover { background: var(--accent2); color: #fff; }
  .btn-pause { background: transparent; border: 1px solid #f6c90e; color: #f6c90e; }
  .btn-pause:hover { background: rgba(246,201,14,.15); }
  .btn-stats { background: transparent; border: 1px solid #a78bfa; color: #a78bfa; }
  .btn-stats:hover { background: rgba(167,139,250,.15); }
  .status-bar { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .status-text { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live); animation: pulse 1.5s ease-in-out infinite; display: inline-block; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  .refresh-progress { width: 50px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .refresh-bar { height: 100%; background: var(--accent); width: 100%; transform-origin: left; animation: drain 60s linear forwards; }
  @keyframes drain { to { transform: scaleX(0); } }

  /* GRID NAV D-PAD */
  .dpad { display: flex; align-items: center; gap: 3px; }
  .dpad-btn { width: 24px; height: 24px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all .15s; }
  .dpad-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.08); }
  .dpad-center { width: 24px; height: 24px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-family: 'Space Mono', monospace; }

  /* GRID WRAPPER */
  #grid-wrapper { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px; transition: box-shadow .3s; }
  #grid-wrapper::-webkit-scrollbar { width: 5px; }
  #grid-wrapper::-webkit-scrollbar-track { background: var(--bg); }
  #grid-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #grid-wrapper.has-active-audio { box-shadow: inset 0 0 0 2px rgba(0,229,255,.2), inset 0 0 40px rgba(0,229,255,.04); }
  #grid { display: grid; gap: 8px; }

  /* TILE */
  .tile { position: relative; background: #000; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: border-color .2s, box-shadow .2s, transform .25s, z-index .25s; aspect-ratio: 16/9; }
  .tile:hover { border-color: rgba(0,229,255,.5); }
  .tile.active-audio { border-color: var(--accent) !important; box-shadow: 0 0 0 2px rgba(0,229,255,.4), 0 0 30px rgba(0,229,255,.2); order: -9999; }
  .tile.focused { border-color: #f6c90e !important; box-shadow: 0 0 0 2px rgba(246,201,14,.4), 0 0 24px rgba(246,201,14,.15); z-index: 10; transform: scale(1.04); }
  .tile.focused.active-audio { border-color: var(--accent) !important; }
  .tile video { width: 100%; height: 100%; object-fit: cover; display: block; background: #000; }
  .tile-snapshot { position: absolute; inset: 0; background-size: cover; background-position: center; transition: opacity .5s; }
  .tile-snapshot.hidden { opacity: 0; pointer-events: none; }

  /* TOP BAR */
  .tile-top { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 8px; background: linear-gradient(to bottom,rgba(0,0,0,.75),transparent); pointer-events: none; }
  .badge-live { font-family: 'Space Mono',monospace; font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 2px 6px; border-radius: 3px; background: var(--live); color: #fff; }
  .badge-hd { font-family: 'Space Mono',monospace; font-size: 9px; padding: 2px 5px; border-radius: 3px; background: rgba(0,229,255,.2); border: 1px solid rgba(0,229,255,.4); color: var(--accent); }
  .badge-country { font-family: 'Space Mono',monospace; font-size: 10px; padding: 2px 6px; border-radius: 3px; background: rgba(0,0,0,.55); color: rgba(255,255,255,.85); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,.1); }

  /* BOTTOM BAR */
  .tile-bottom { position: absolute; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: flex-end; padding: 6px 8px; background: linear-gradient(to top,rgba(0,0,0,.85),transparent); }
  .tile-username { font-size: 12px; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; }
  .tile-viewers { font-family: 'Space Mono',monospace; font-size: 10px; color: rgba(255,255,255,.7); }
  .tile-viewers::before { content: '👁 '; }
  .tile-controls { display: flex; gap: 4px; pointer-events: all; }
  .tile-btn { width: 26px; height: 26px; border-radius: 4px; background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.15); color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; backdrop-filter: blur(4px); }
  .tile-btn:hover { background: rgba(255,255,255,.2); }
  .tile-btn.unmuted { background: rgba(0,229,255,.3); border-color: var(--accent); }

  /* META OVERLAY */
  .tile-meta { position: absolute; inset: 0; background: rgba(4,6,12,.92); backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity .18s; display: flex; flex-direction: column; padding: 10px 10px 8px; gap: 5px; overflow-y: auto; overflow-x: hidden; z-index: 20; }
  .tile-meta::-webkit-scrollbar { width: 3px; }
  .tile-meta::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .tile:hover .tile-meta { opacity: 1; pointer-events: all; }
  .meta-header { display: flex; align-items: center; gap: 7px; flex-shrink: 0; padding-bottom: 4px; }
  .meta-name { font-family: 'Syne',sans-serif; font-weight: 800; font-size: 13px; color: #fff; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta-divider { height: 1px; background: var(--border); flex-shrink: 0; margin: 1px 0; }
  .meta-row { display: flex; align-items: baseline; gap: 5px; font-family: 'Space Mono',monospace; font-size: 10px; line-height: 1.5; flex-shrink: 0; }
  .meta-icon { flex-shrink: 0; font-size: 10px; }
  .meta-label { color: var(--muted); white-space: nowrap; }
  .meta-val { color: var(--text); word-break: break-word; }
  .meta-quality-row { display: flex; flex-wrap: wrap; gap: 3px; flex-shrink: 0; }
  .meta-quality-badge { font-family: 'Space Mono',monospace; font-size: 9px; padding: 2px 6px; border-radius: 3px; background: rgba(0,229,255,.15); border: 1px solid rgba(0,229,255,.3); color: var(--accent); }
  .meta-tags { display: flex; flex-wrap: wrap; gap: 3px; flex-shrink: 0; padding-top: 1px; }
  .meta-tag { font-family: 'Space Mono',monospace; font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .15s; }
  .meta-tag:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.08); }
  .meta-spacer { flex: 1; min-height: 6px; }
  .meta-cta { flex-shrink: 0; }
  .cta-link { display: block; padding: 7px 12px; background: var(--accent2); color: #fff; text-decoration: none; border-radius: var(--radius); font-size: 11px; font-weight: 700; text-align: center; font-family: 'Space Mono',monospace; letter-spacing: .5px; box-shadow: 0 3px 16px rgba(255,61,113,.4); transition: transform .15s, box-shadow .15s; }
  .cta-link:hover { transform: scale(1.03); box-shadow: 0 5px 22px rgba(255,61,113,.6); }

  /* EMPTY / LOADING */
  #empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 12px; color: var(--muted); font-size: 14px; }
  #empty-state .icon { font-size: 40px; opacity: .4; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SCROLL SENTINEL */
  #scroll-sentinel { height: 48px; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--muted); font-family: 'Space Mono',monospace; font-size: 11px; margin-top: 4px; }
  .load-spinner { display: none; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  #scroll-sentinel.loading .load-spinner { display: inline-block; }

  .tile-error { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.7); font-size: 11px; color: var(--muted); font-family: 'Space Mono',monospace; z-index: 5; }
  .aff-input { width: 130px !important; }

  /* ── STATS MODAL ── */
  #stats-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); align-items: center; justify-content: center; }
  #stats-modal.open { display: flex; }
  .stats-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: 560px; max-width: 95vw; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
  .stats-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .stats-title { font-size: 15px; font-weight: 800; letter-spacing: -.3px; }
  .stats-title span { color: var(--accent); }
  .stats-close { width: 28px; height: 28px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all .15s; }
  .stats-close:hover { border-color: var(--accent2); color: var(--accent2); }
  .stats-body { overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 20px; }
  .stats-body::-webkit-scrollbar { width: 4px; }
  .stats-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .stats-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .kpi { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .kpi-val { font-family: 'Space Mono',monospace; font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .kpi-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
  .stats-section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-family: 'Space Mono',monospace; }
  .stats-bar-list { display: flex; flex-direction: column; gap: 6px; }
  .stats-bar-row { display: flex; align-items: center; gap: 8px; font-family: 'Space Mono',monospace; font-size: 10px; }
  .stats-bar-label { width: 80px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; cursor: pointer; }
  .stats-bar-label:hover { color: var(--accent); }
  .stats-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .stats-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .4s; }
  .stats-bar-fill.pink { background: var(--accent2); }
  .stats-bar-fill.purple { background: #a78bfa; }
  .stats-bar-count { width: 40px; text-align: right; color: var(--muted); }
  .stats-tag-cloud { display: flex; flex-wrap: wrap; gap: 5px; }
  .stats-tag { font-family: 'Space Mono',monospace; font-size: 9px; padding: 3px 8px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 4px; }
  .stats-tag:hover { border-color: var(--accent); color: var(--accent); }
  .stats-tag .tag-count { color: var(--accent); font-weight: 700; }
  .stats-updated { font-family: 'Space Mono',monospace; font-size: 10px; color: var(--muted); text-align: right; }
</style>
</head>
<body>

<header>
  <div class="logo">LIVE<span>GRID</span></div>
  <div class="controls">
    <div style="display:flex;align-items:center;gap:5px;">
      <label>Grid</label>
      <select id="gridSelect">
        <option value="1">1×1</option>
        <option value="4" selected>2×2</option>
        <option value="9">3×3</option>
        <option value="16">4×4</option>
        <option value="25">5×5</option>
        <option value="36">6×6</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:5px;">
      <label>Gender</label>
      <select id="genderSelect">
        <option value="">All</option>
        <option value="female" selected>Female</option>
        <option value="male">Male</option>
        <option value="couple">Couple</option>
        <option value="trans">Trans</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:5px;">
      <label>Sort</label>
      <select id="sortSelect">
        <option value="viewersCount" selected>Most Viewers</option>
        <option value="onlineTime">Longest Online</option>
        <option value="new">Newest</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:5px;">
      <label>Tag</label>
      <input type="text" id="tagInput" placeholder="latina, bbw…">
    </div>
    <div style="display:flex;align-items:center;gap:5px;">
      <label>Country</label>
      <select id="countrySelect"><option value="">All</option></select>
    </div>
    <div style="display:flex;align-items:center;gap:5px;">
      <label>Quality</label>
      <select id="qualitySelect">
        <option value="original">Original (Max)</option>
        <option value="720p">720p</option>
        <option value="480p">480p</option>
        <option value="240p">240p</option>
        <option value="160p">160p</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:5px;">
      <label>Aff.</label>
      <input type="text" id="affId" class="aff-input" placeholder="campaign-id">
    </div>

    <!-- D-PAD NAVIGATOR -->
    <div style="display:flex;align-items:center;gap:5px;">
      <label>Nav</label>
      <div class="dpad">
        <div style="display:grid;grid-template-columns:repeat(3,24px);grid-template-rows:repeat(3,24px);gap:2px;">
          <div></div>
          <button class="dpad-btn" id="dpad-up" title="Up (↑)">▲</button>
          <div></div>
          <button class="dpad-btn" id="dpad-left" title="Left (←)">◀</button>
          <div class="dpad-center" title="Current position" id="dpad-pos">—</div>
          <button class="dpad-btn" id="dpad-right" title="Right (→)">▶</button>
          <div></div>
          <button class="dpad-btn" id="dpad-down" title="Down (↓)">▼</button>
          <div></div>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="loadStreams()">⟳ Refresh</button>
    <button class="btn btn-pause" id="pauseAllBtn" onclick="togglePauseAll()">⏸ Pause All</button>
    <button class="btn btn-danger" onclick="muteAll()">🔇 Mute All</button>
    <button class="btn btn-stats" onclick="openStats()">📊 Stats</button>
  </div>
  <div class="status-bar">
    <span class="live-dot"></span>
    <span class="status-text" id="statusText">—</span>
    <div class="refresh-progress"><div class="refresh-bar" id="refreshBar"></div></div>
  </div>
</header>

<div id="grid-wrapper">
  <div id="grid"></div>
  <div id="empty-state"><div class="icon">📡</div><div>Loading live streams…</div></div>
  <div id="scroll-sentinel"><span class="load-spinner"></span><span class="sentinel-text"></span></div>
</div>

<!-- STATS MODAL -->
<div id="stats-modal">
  <div class="stats-box">
    <div class="stats-header">
      <div class="stats-title">LIVE<span>GRID</span> — Live Stats</div>
      <button class="stats-close" onclick="closeStats()">✕</button>
    </div>
    <div class="stats-body" id="stats-body">
      <div style="color:var(--muted);font-family:'Space Mono',monospace;font-size:12px;">Loading stats…</div>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const hlsInstances  = new Map();
let refreshTimer    = null;
let allPaused       = false;
let currentOffset   = 0;
let isLoadingMore   = false;
let hasMore         = true;
let allModels       = [];
let currentFiltered = [];
let infiniteObserver = null;
let focusedIndex    = -1;  // D-pad nav index into rendered tiles
const BATCH = 16;
const API   = 'https://go.stripchat.com/api/models';

// ── GENDER FIX ─────────────────────────────────────────────────────────────
// Stripchat API uses 'type' param with values: girls, guys, couples, trans
// BUT go.stripchat.com/api/models uses 'gender' with: female, male, couple, trans
// The real fix: try both param names and filter client-side as backup
function genderParam(val) {
  if (!val) return {};
  // API uses 'gender' param on go.stripchat.com
  return { gender: val };
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function muteAll() {
  document.querySelectorAll('video').forEach(v => v.muted = true);
  document.querySelectorAll('.tile-btn.unmuted').forEach(b => { b.classList.remove('unmuted'); b.textContent = '🔇'; });
  document.querySelectorAll('.tile').forEach(t => { t.classList.remove('active-audio'); t.style.order = ''; });
  document.getElementById('grid-wrapper').classList.remove('has-active-audio');
}

function togglePauseAll() {
  allPaused = !allPaused;
  const btn = document.getElementById('pauseAllBtn');
  document.querySelectorAll('video').forEach(v => { if (allPaused) v.pause(); else v.play().catch(() => {}); });
  btn.textContent = allPaused ? '▶ Play All' : '⏸ Pause All';
}

function fmtViewers(n) {
  if (!n) return '0';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}

function fmtNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}

function fmtTime(seconds) {
  if (!seconds || seconds < 0) return null;
  const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m`;
  return '<1m';
}

function buildAffUrl(username) {
  const aff = document.getElementById('affId').value.trim();
  return aff ? `https://stripchat.com/${username}?campaign=${encodeURIComponent(aff)}` : `https://stripchat.com/${username}`;
}

function getCountryFlag(code) {
  if (!code || code.length !== 2) return '';
  return [...code.toUpperCase()].map(c => String.fromCodePoint(c.charCodeAt(0)+127397)).join('');
}

function destroyAll() {
  hlsInstances.forEach(h => { try { h.destroy(); } catch(e){} });
  hlsInstances.clear();
  document.querySelectorAll('video').forEach(v => { v.pause(); v.src=''; v.removeAttribute('src'); });
  document.getElementById('grid-wrapper').classList.remove('has-active-audio');
  focusedIndex = -1;
  updateDpadPos();
}

function setTagFilter(tag) {
  document.getElementById('tagInput').value = tag;
  loadStreams();
}

// ── UNMUTE TILE (shared logic) ─────────────────────────────────────────────
function unmuteTile(tile) {
  const video = tile.querySelector('video');
  if (!video) return;
  // Mute everything else first
  document.querySelectorAll('video').forEach(v => v.muted = true);
  document.querySelectorAll('.tile-btn.unmuted').forEach(b => { b.classList.remove('unmuted'); b.textContent = '🔇'; });
  document.querySelectorAll('.tile').forEach(t => { t.classList.remove('active-audio'); t.style.order = ''; });
  // Unmute this tile
  video.muted = false;
  const muteBtn = tile.querySelector('.tile-btn');
  if (muteBtn) { muteBtn.classList.add('unmuted'); muteBtn.textContent = '🔊'; }
  tile.classList.add('active-audio');
  tile.style.order = '-9999';
  document.getElementById('grid-wrapper').classList.add('has-active-audio');
}

// ── D-PAD NAVIGATION ──────────────────────────────────────────────────────
function getVisibleTiles() {
  return [...document.querySelectorAll('#grid .tile')];
}

function getCols() {
  return parseInt(Math.sqrt(parseInt(document.getElementById('gridSelect').value)));
}

function updateDpadPos() {
  const tiles = getVisibleTiles();
  const el = document.getElementById('dpad-pos');
  if (focusedIndex < 0 || focusedIndex >= tiles.length) {
    el.textContent = '—';
    return;
  }
  const cols = getCols();
  const row = Math.floor(focusedIndex / cols) + 1;
  const col = (focusedIndex % cols) + 1;
  el.textContent = `${row},${col}`;
}

function focusTile(idx) {
  const tiles = getVisibleTiles();
  if (idx < 0 || idx >= tiles.length) return;

  // Remove focused from all
  tiles.forEach(t => t.classList.remove('focused'));

  focusedIndex = idx;
  const tile = tiles[idx];
  tile.classList.add('focused');

  // Unmute + scroll into view
  unmuteTile(tile);
  tile.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  updateDpadPos();
}

function dpadMove(dir) {
  const tiles = getVisibleTiles();
  if (!tiles.length) return;
  const cols = getCols();
  let idx = focusedIndex < 0 ? 0 : focusedIndex;

  if (dir === 'up')    idx = Math.max(0, idx - cols);
  if (dir === 'down')  idx = Math.min(tiles.length - 1, idx + cols);
  if (dir === 'left')  idx = Math.max(0, idx - 1);
  if (dir === 'right') idx = Math.min(tiles.length - 1, idx + 1);

  focusTile(idx);
}

document.getElementById('dpad-up').onclick    = () => dpadMove('up');
document.getElementById('dpad-down').onclick  = () => dpadMove('down');
document.getElementById('dpad-left').onclick  = () => dpadMove('left');
document.getElementById('dpad-right').onclick = () => dpadMove('right');

// Keyboard arrows
document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault();
    const map = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right' };
    dpadMove(map[e.key]);
  }
});

// ── COUNTRY DROPDOWN ──────────────────────────────────────────────────────
function populateCountryFilter(models) {
  const sel = document.getElementById('countrySelect');
  const current = sel.value;
  const counts = {};
  models.forEach(m => { if (m.country) counts[m.country] = (counts[m.country]||0)+1; });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  while (sel.options.length > 1) sel.remove(1);
  sorted.forEach(([code, cnt]) => {
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = `${getCountryFlag(code)} ${code.toUpperCase()} (${cnt})`;
    sel.appendChild(opt);
  });
  if (current) sel.value = current;
}

function applyCountryFilter(models) {
  const country = document.getElementById('countrySelect').value;
  return country ? models.filter(m => m.country === country) : models;
}

// ── FETCH ─────────────────────────────────────────────────────────────────
async function loadStreams() {
  const gender = document.getElementById('genderSelect').value;
  const sort   = document.getElementById('sortSelect').value;
  const tag    = document.getElementById('tagInput').value.trim();

  document.getElementById('statusText').textContent = 'Loading…';

  const params = new URLSearchParams({
    limit: 200,
    sortBy: sort,
    ...genderParam(gender),
    ...(tag && { tag }),
  });

  try {
    const res  = await fetch(`${API}?${params}`, { headers: { Accept: 'application/json' } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    let models = (data.models || []).filter(m => m.status === 'public' && m.stream?.urls);
    // Client-side gender filter as safety net (API sometimes ignores param)
    if (gender) models = models.filter(m => m.gender === gender);
    allModels = models;
  } catch(e) {
    document.getElementById('statusText').textContent = 'API error — retry';
    console.error(e);
    return;
  }

  populateCountryFilter(allModels);
  renderGrid();

  const bar = document.getElementById('refreshBar');
  bar.style.animation = 'none'; bar.offsetHeight;
  bar.style.animation = 'drain 60s linear forwards';
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadStreams, 60000);
}

// ── RENDER GRID ────────────────────────────────────────────────────────────
function renderGrid() {
  destroyAll();
  const count    = parseInt(document.getElementById('gridSelect').value);
  const cols     = Math.sqrt(count);
  const quality  = document.getElementById('qualitySelect').value;
  const grid     = document.getElementById('grid');
  const empty    = document.getElementById('empty-state');
  const sentinel = document.getElementById('scroll-sentinel');

  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  allPaused = false;
  document.getElementById('pauseAllBtn').textContent = '⏸ Pause All';

  currentFiltered = applyCountryFilter(allModels);

  if (!currentFiltered.length) {
    empty.style.display = 'flex';
    sentinel.style.display = 'none';
    document.getElementById('statusText').textContent = 'No streams found';
    return;
  }
  empty.style.display = 'none';

  const firstBatch = currentFiltered.slice(0, count);
  currentOffset = firstBatch.length;
  firstBatch.forEach(m => grid.appendChild(buildTile(m, quality)));

  hasMore = currentOffset < currentFiltered.length;
  sentinel.style.display = 'flex';
  sentinel.classList.remove('loading');
  sentinel.querySelector('.sentinel-text').textContent = hasMore ? 'Scroll for more' : '';
  document.getElementById('statusText').textContent = `${currentFiltered.length} streams · ${new Date().toLocaleTimeString()}`;
  setupInfiniteScroll();
}

// ── INFINITE SCROLL ────────────────────────────────────────────────────────
function setupInfiniteScroll() {
  if (infiniteObserver) infiniteObserver.disconnect();
  const sentinel = document.getElementById('scroll-sentinel');
  infiniteObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && !isLoadingMore && hasMore) loadMoreTiles();
  }, { root: document.getElementById('grid-wrapper'), rootMargin: '200px', threshold: 0.1 });
  infiniteObserver.observe(sentinel);
}

async function loadMoreTiles() {
  if (isLoadingMore || !hasMore) return;
  isLoadingMore = true;
  const sentinel = document.getElementById('scroll-sentinel');
  sentinel.classList.add('loading');
  sentinel.querySelector('.sentinel-text').textContent = 'Loading…';
  await new Promise(r => setTimeout(r, 250));
  const quality = document.getElementById('qualitySelect').value;
  const grid    = document.getElementById('grid');
  const batch   = currentFiltered.slice(currentOffset, currentOffset + BATCH);
  batch.forEach(m => grid.appendChild(buildTile(m, quality)));
  currentOffset += batch.length;
  hasMore = currentOffset < currentFiltered.length;
  sentinel.classList.remove('loading');
  if (hasMore) {
    sentinel.querySelector('.sentinel-text').textContent = 'Scroll for more';
  } else {
    sentinel.querySelector('.sentinel-text').textContent = `All ${currentFiltered.length} streams loaded`;
    setTimeout(() => { sentinel.style.display = 'none'; }, 3000);
  }
  isLoadingMore = false;
}

// ── BUILD TILE ─────────────────────────────────────────────────────────────
function buildTile(model, quality) {
  const streamUrl = model.stream.urls[quality] || model.stream.urls['original'] || model.stream.url;
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.dataset.username = model.username;

  const snap = document.createElement('div');
  snap.className = 'tile-snapshot';
  const snapUrl = model.snapshotUrl || model.widgetPreviewUrl;
  if (snapUrl) snap.style.backgroundImage = `url(${snapUrl})`;

  const video = document.createElement('video');
  video.muted = true; video.autoplay = true; video.playsInline = true;

  if (Hls.isSupported()) {
    const hls = new Hls({ maxBufferLength: 15, maxMaxBufferLength: 30, enableWorker: true, strictManifestParsing: false });
    hls.loadSource(streamUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); snap.classList.add('hidden'); });
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) { const e = document.createElement('div'); e.className='tile-error'; e.textContent='Stream unavailable'; tile.appendChild(e); }
    });
    hlsInstances.set(model.username, hls);
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = streamUrl;
    video.addEventListener('loadeddata', () => snap.classList.add('hidden'));
  }

  // TOP BAR
  const top = document.createElement('div'); top.className = 'tile-top';
  const topLeft = document.createElement('div'); topLeft.style.cssText='display:flex;gap:4px;align-items:center;pointer-events:none;';
  const liveBadge = document.createElement('span'); liveBadge.className='badge-live'; liveBadge.textContent='LIVE';
  topLeft.appendChild(liveBadge);
  if (model.broadcastHD) { const hd=document.createElement('span'); hd.className='badge-hd'; hd.textContent='HD'; topLeft.appendChild(hd); }
  const topRight = document.createElement('div'); topRight.style.cssText='display:flex;gap:4px;align-items:center;pointer-events:none;';
  if (model.country) { const c=document.createElement('span'); c.className='badge-country'; c.textContent=getCountryFlag(model.country)+' '+model.country.toUpperCase(); topRight.appendChild(c); }
  top.appendChild(topLeft); top.appendChild(topRight);

  // BOTTOM BAR
  const bot = document.createElement('div'); bot.className = 'tile-bottom';
  const nameEl = document.createElement('div'); nameEl.className='tile-username'; nameEl.textContent=model.username;
  const viewEl = document.createElement('div'); viewEl.className='tile-viewers'; viewEl.textContent=fmtViewers(model.viewersCount);
  const ctrlEl = document.createElement('div'); ctrlEl.className='tile-controls';

  const muteBtn = document.createElement('button');
  muteBtn.className = 'tile-btn'; muteBtn.textContent = '🔇'; muteBtn.title = 'Toggle audio';
  muteBtn.onclick = e => {
    e.stopPropagation();
    if (video.muted) {
      unmuteTile(tile);
      muteBtn.classList.add('unmuted'); muteBtn.textContent = '🔊';
    } else {
      video.muted = true; muteBtn.classList.remove('unmuted'); muteBtn.textContent = '🔇';
      tile.classList.remove('active-audio'); tile.style.order = '';
      document.getElementById('grid-wrapper').classList.remove('has-active-audio');
    }
  };

  const fsBtn = document.createElement('button');
  fsBtn.className = 'tile-btn'; fsBtn.textContent = '⛶'; fsBtn.title = 'Fullscreen';
  fsBtn.onclick = e => {
    e.stopPropagation();
    document.querySelectorAll('video').forEach(v => { if (v !== video) v.pause(); });
    const onExit = () => { if (!document.fullscreenElement) { document.querySelectorAll('video').forEach(v => { if (v!==video && !allPaused) v.play().catch(()=>{}); }); document.removeEventListener('fullscreenchange', onExit); } };
    document.addEventListener('fullscreenchange', onExit);
    (video.requestFullscreen || video.webkitRequestFullscreen).call(video);
  };

  ctrlEl.appendChild(muteBtn); ctrlEl.appendChild(fsBtn);
  bot.appendChild(nameEl); bot.appendChild(viewEl); bot.appendChild(ctrlEl);

  tile.appendChild(snap); tile.appendChild(video); tile.appendChild(top); tile.appendChild(bot);
  tile.appendChild(buildMetaPanel(model));
  return tile;
}

// ── META PANEL ─────────────────────────────────────────────────────────────
function buildMetaPanel(model) {
  const meta = document.createElement('div');
  meta.className = 'tile-meta';
  meta.addEventListener('mousedown', e => e.stopPropagation());

  const hdr = document.createElement('div'); hdr.className = 'meta-header';
  const nameSpan = document.createElement('span'); nameSpan.className='meta-name'; nameSpan.textContent=model.username;
  const lb = document.createElement('span'); lb.className='badge-live'; lb.textContent='LIVE';
  hdr.appendChild(nameSpan); hdr.appendChild(lb);
  meta.appendChild(hdr);

  const divider = () => { const d=document.createElement('div'); d.className='meta-divider'; return d; };
  meta.appendChild(divider());

  const addRow = (icon, label, val) => {
    if (!val && val !== 0) return;
    const row = document.createElement('div'); row.className='meta-row';
    row.innerHTML = `<span class="meta-icon">${icon}</span><span class="meta-label">${label}:&nbsp;</span><span class="meta-val">${val}</span>`;
    meta.appendChild(row);
  };

  addRow('👁', 'Viewers', fmtViewers(model.viewersCount || 0));

  let onlineStr = null;
  if (model.onlineTime) onlineStr = fmtTime(model.onlineTime);
  else if (model.liveSince) onlineStr = fmtTime(Math.floor((Date.now()-new Date(model.liveSince).getTime())/1000));
  if (onlineStr) addRow('⏱', 'Online', onlineStr);

  if (model.country) addRow('📍', 'Country', `${getCountryFlag(model.country)} ${model.country.toUpperCase()}`);
  if (model.city)    addRow('🏙', 'City', model.city);
  if (model.age)     addRow('🎂', 'Age', `${model.age}`);
  if (model.gender)  addRow('✦', 'Gender', {female:'♀ Female',male:'♂ Male',couple:'⚤ Couple',trans:'⚧ Trans'}[model.gender] || model.gender);
  if (model.ethnicity)  addRow('🌐', 'Ethnicity', model.ethnicity);
  if (model.bodyType)   addRow('⚡', 'Body', model.bodyType);
  if (model.hairColor)  addRow('💇', 'Hair', model.hairColor);
  if (model.eyeColor)   addRow('👁', 'Eyes', model.eyeColor);

  // Quality streams available
  const availableQualities = Object.keys(model.stream.urls || {}).filter(k => k !== 'original' && model.stream.urls[k]);
  if (availableQualities.length) {
    meta.appendChild(divider());
    const qRow = document.createElement('div'); qRow.className='meta-row'; qRow.style.alignItems='center';
    qRow.innerHTML = `<span class="meta-icon">📺</span><span class="meta-label">Streams:&nbsp;</span>`;
    const qBadges = document.createElement('div'); qBadges.className='meta-quality-row';
    // Always show 'original' first
    const allQ = model.stream.urls.original ? ['original', ...availableQualities] : availableQualities;
    [...new Set(allQ)].forEach(q => {
      const b = document.createElement('span'); b.className='meta-quality-badge';
      b.textContent = q === 'original' ? 'MAX' : q;
      qBadges.appendChild(b);
    });
    qRow.appendChild(qBadges);
    meta.appendChild(qRow);
  }

  const langs = model.languages || model.spokenLanguages;
  if (langs) addRow('🗣', 'Language', Array.isArray(langs) ? langs.join(', ') : langs);

  // Tags — clickable to filter
  const tags = model.tags || model.categories || [];
  if (tags.length > 0) {
    meta.appendChild(divider());
    const tagsEl = document.createElement('div'); tagsEl.className='meta-tags';
    tags.slice(0, 16).forEach(t => {
      const tagStr = typeof t === 'string' ? t : (t.tag || t.name || String(t));
      const tag = document.createElement('span'); tag.className='meta-tag'; tag.textContent=tagStr;
      tag.title = `Filter by "${tagStr}"`;
      tag.onclick = e => { e.stopPropagation(); setTagFilter(tagStr); };
      tagsEl.appendChild(tag);
    });
    meta.appendChild(tagsEl);
  }

  const spacer = document.createElement('div'); spacer.className='meta-spacer'; meta.appendChild(spacer);

  const ctaWrap = document.createElement('div'); ctaWrap.className='meta-cta';
  const ctaLink = document.createElement('a'); ctaLink.className='cta-link';
  ctaLink.href=buildAffUrl(model.username); ctaLink.target='_blank'; ctaLink.rel='noopener noreferrer';
  ctaLink.textContent=`▶ Join ${model.username}'s Room`;
  ctaLink.onclick = e => e.stopPropagation();
  ctaWrap.appendChild(ctaLink); meta.appendChild(ctaWrap);
  return meta;
}

// ── STATS MODAL ────────────────────────────────────────────────────────────
function openStats() {
  document.getElementById('stats-modal').classList.add('open');
  renderStats();
}

function closeStats() {
  document.getElementById('stats-modal').classList.remove('open');
}

document.getElementById('stats-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('stats-modal')) closeStats();
});

function renderStats() {
  const body = document.getElementById('stats-body');
  const models = allModels;
  if (!models.length) { body.innerHTML = '<div style="color:var(--muted);font-family:\'Space Mono\',monospace;font-size:12px;">No data — load streams first.</div>'; return; }

  // KPIs
  const totalViewers = models.reduce((s, m) => s + (m.viewersCount || 0), 0);
  const hdCount = models.filter(m => m.broadcastHD).length;
  const countries = new Set(models.map(m => m.country).filter(Boolean)).size;

  // Gender breakdown
  const genderCounts = {};
  models.forEach(m => { if (m.gender) genderCounts[m.gender] = (genderCounts[m.gender]||0)+1; });

  // Country top 10
  const countryCounts = {};
  models.forEach(m => { if (m.country) countryCounts[m.country] = (countryCounts[m.country]||0)+1; });
  const topCountries = Object.entries(countryCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // Tag cloud — collect ALL tags from loaded models
  const tagCounts = {};
  models.forEach(m => {
    const tags = m.tags || m.categories || [];
    tags.forEach(t => {
      const str = typeof t === 'string' ? t : (t.tag || t.name || String(t));
      if (str) tagCounts[str] = (tagCounts[str]||0)+1;
    });
  });
  const topTags = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,40);

  // Quality availability
  const qualCounts = {};
  models.forEach(m => {
    Object.keys(m.stream?.urls || {}).forEach(q => { if (m.stream.urls[q]) qualCounts[q] = (qualCounts[q]||0)+1; });
  });

  body.innerHTML = '';

  // KPI row
  const kpis = document.createElement('div'); kpis.className='stats-kpis';
  [
    { val: fmtNum(models.length), label: 'Live Streams' },
    { val: fmtNum(totalViewers), label: 'Total Viewers' },
    { val: countries, label: 'Countries' },
    { val: hdCount, label: 'HD Streams' },
    { val: Math.round(totalViewers/Math.max(models.length,1)), label: 'Avg Viewers' },
    { val: Object.keys(tagCounts).length, label: 'Unique Tags' },
  ].forEach(k => {
    kpis.innerHTML += `<div class="kpi"><div class="kpi-val">${k.val}</div><div class="kpi-label">${k.label}</div></div>`;
  });
  body.appendChild(kpis);

  // Gender breakdown
  const gSection = document.createElement('div');
  gSection.innerHTML = `<div class="stats-section-title">Gender Breakdown</div>`;
  const gList = document.createElement('div'); gList.className='stats-bar-list';
  const gMax = Math.max(...Object.values(genderCounts), 1);
  const gColors = { female: '', male: 'pink', couple: 'purple', trans: 'purple' };
  Object.entries(genderCounts).sort((a,b)=>b[1]-a[1]).forEach(([g,cnt]) => {
    const row = document.createElement('div'); row.className='stats-bar-row';
    row.innerHTML = `<div class="stats-bar-label">${g}</div><div class="stats-bar-track"><div class="stats-bar-fill ${gColors[g]||''}" style="width:${Math.round(cnt/gMax*100)}%"></div></div><div class="stats-bar-count">${cnt}</div>`;
    gList.appendChild(row);
  });
  gSection.appendChild(gList);
  body.appendChild(gSection);

  // Top countries
  const cSection = document.createElement('div');
  cSection.innerHTML = `<div class="stats-section-title">Top Countries</div>`;
  const cList = document.createElement('div'); cList.className='stats-bar-list';
  const cMax = topCountries[0]?.[1] || 1;
  topCountries.forEach(([code, cnt]) => {
    const row = document.createElement('div'); row.className='stats-bar-row';
    const label = document.createElement('div'); label.className='stats-bar-label';
    label.textContent = `${getCountryFlag(code)} ${code.toUpperCase()}`;
    label.title = 'Filter by country';
    label.onclick = () => { document.getElementById('countrySelect').value = code; renderGrid(); closeStats(); };
    row.appendChild(label);
    row.innerHTML += `<div class="stats-bar-track"><div class="stats-bar-fill" style="width:${Math.round(cnt/cMax*100)}%"></div></div><div class="stats-bar-count">${cnt}</div>`;
    cList.appendChild(row);
  });
  cSection.appendChild(cList);
  body.appendChild(cSection);

  // Quality availability
  const qSection = document.createElement('div');
  qSection.innerHTML = `<div class="stats-section-title">Available Stream Qualities</div>`;
  const qList = document.createElement('div'); qList.className='stats-bar-list';
  const qMax = Math.max(...Object.values(qualCounts), 1);
  Object.entries(qualCounts).sort((a,b)=>b[1]-a[1]).forEach(([q, cnt]) => {
    const row = document.createElement('div'); row.className='stats-bar-row';
    row.innerHTML = `<div class="stats-bar-label">${q==='original'?'MAX/Original':q}</div><div class="stats-bar-track"><div class="stats-bar-fill purple" style="width:${Math.round(cnt/qMax*100)}%"></div></div><div class="stats-bar-count">${cnt}</div>`;
    qList.appendChild(row);
  });
  qSection.appendChild(qList);
  body.appendChild(qSection);

  // Tag cloud
  if (topTags.length) {
    const tSection = document.createElement('div');
    tSection.innerHTML = `<div class="stats-section-title">Live Tag Cloud (click to filter)</div>`;
    const cloud = document.createElement('div'); cloud.className='stats-tag-cloud';
    topTags.forEach(([tag, cnt]) => {
      const el = document.createElement('div'); el.className='stats-tag';
      el.innerHTML = `${tag} <span class="tag-count">${cnt}</span>`;
      el.onclick = () => { setTagFilter(tag); closeStats(); };
      cloud.appendChild(el);
    });
    tSection.appendChild(cloud);
    body.appendChild(tSection);
  }

  const updated = document.createElement('div'); updated.className='stats-updated';
  updated.textContent = `Updated ${new Date().toLocaleTimeString()}`;
  body.appendChild(updated);
}

// ── BOOT ──────────────────────────────────────────────────────────────────
['gridSelect','genderSelect','sortSelect','qualitySelect'].forEach(id => {
  document.getElementById(id).addEventListener('change', loadStreams);
});
document.getElementById('countrySelect').addEventListener('change', renderGrid);
document.getElementById('tagInput').addEventListener('keydown', e => { if (e.key==='Enter') loadStreams(); });

loadStreams();
</script>
