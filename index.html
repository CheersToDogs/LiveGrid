<!DOCTYPE html>


<html lang="en">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>LiveGrid � Multi-Stream Viewer</title>


<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>


<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">


<style>


  :root {


    --bg: #080a0e;


    --surface: #0f1218;


    --surface2: #161b24;


    --border: #1e2533;


    --accent: #00e5ff;


    --accent2: #ff3d71;


    --text: #e8edf5;


    --muted: #4a5568;


    --live: #ff3d71;


    --fav: #f59e0b;


    --radius: 6px;


  }


  * { box-sizing: border-box; margin: 0; padding: 0; }


  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }





  /* HEADER */


  header { display: flex; align-items: center; gap: 16px; padding: 8px 14px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; flex-wrap: wrap; }


  .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); white-space: nowrap; }


  .logo span { color: var(--accent); }


  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex: 1; }


  label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }


  select, input[type="text"] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: var(--radius); font-family: 'Space Mono', monospace; font-size: 11px; outline: none; cursor: pointer; transition: border-color .2s; }


  select:hover, input:hover, select:focus, input:focus { border-color: var(--accent); }


  input[type="text"] { width: 120px; }


  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: var(--radius); font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: .5px; cursor: pointer; border: none; transition: all .2s; text-transform: uppercase; }


  .btn-primary { background: var(--accent); color: #000; }


  .btn-primary:hover { background: #33ecff; }


  .btn-danger { background: transparent; border: 1px solid var(--accent2); color: var(--accent2); }


  .btn-danger:hover { background: var(--accent2); color: #fff; }


  .btn-pause { background: transparent; border: 1px solid #f6c90e; color: #f6c90e; }


  .btn-pause:hover { background: rgba(246,201,14,.15); }


  .btn-stats { background: transparent; border: 1px solid #a78bfa; color: #a78bfa; }


  .btn-stats:hover { background: rgba(167,139,250,.15); }


  .btn-fav { background: transparent; border: 1px solid var(--fav); color: var(--fav); }


  .btn-fav:hover { background: rgba(245,158,11,.15); }


  .btn-loadall { background: transparent; border: 1px solid #34d399; color: #34d399; }


  .btn-loadall:hover { background: rgba(52,211,153,.15); }


  .status-bar { margin-left: auto; display: flex; align-items: center; gap: 10px; }


  .status-text { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }


  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live); animation: pulse 1.5s ease-in-out infinite; display: inline-block; }


  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }


  .refresh-progress { width: 50px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }


  .refresh-bar { height: 100%; background: var(--accent); width: 100%; transform-origin: left; animation: drain 60s linear forwards; }


  @keyframes drain { to { transform: scaleX(0); } }





  /* GRID NAV D-PAD */


  .dpad { display: flex; align-items: center; gap: 3px; }


  .dpad-btn { width: 24px; height: 24px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all .15s; }


  .dpad-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.08); }


  .dpad-center { width: 24px; height: 24px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-family: 'Space Mono', monospace; }





  /* GRID WRAPPER */


  #grid-wrapper { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px; transition: box-shadow .3s; }


  #grid-wrapper::-webkit-scrollbar { width: 5px; }


  #grid-wrapper::-webkit-scrollbar-track { background: var(--bg); }


  #grid-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }


  #grid-wrapper.has-active-audio { box-shadow: inset 0 0 0 2px rgba(0,229,255,.2), inset 0 0 40px rgba(0,229,255,.04); }


  #grid { display: grid; gap: 8px; }





  /* TILE */


  .tile { position: relative; background: #000; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: border-color .2s, box-shadow .2s, transform .25s; aspect-ratio: 16/9; }


  .tile:hover { border-color: rgba(0,229,255,.5); }


  .tile.active-audio { border-color: var(--accent) !important; box-shadow: 0 0 0 2px rgba(0,229,255,.4), 0 0 30px rgba(0,229,255,.2); order: -9999; }


  .tile.focused { border-color: #f6c90e !important; box-shadow: 0 0 0 2px rgba(246,201,14,.4), 0 0 24px rgba(246,201,14,.15); z-index: 10; transform: scale(1.04); }


  .tile.focused.active-audio { border-color: var(--accent) !important; }


  .tile.favorited { box-shadow: inset 0 0 0 2px rgba(245,158,11,.3); }


  /* Paused-by-viewport overlay */


  .tile.vp-paused video { opacity: 0.15; }


  .tile.vp-paused::after { content: '▶'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 28px; opacity: 0.5; pointer-events: none; }


  .tile video { width: 100%; height: 100%; object-fit: cover; display: block; background: #000; transition: opacity .4s; }


  .tile-snapshot { position: absolute; inset: 0; background-size: cover; background-position: center; transition: opacity .5s; }


  .tile-snapshot.hidden { opacity: 0; pointer-events: none; }





  /* LOAD ALL PROGRESS BAR */


  #loadall-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 500; background: var(--surface); border-top: 1px solid var(--border); padding: 6px 16px; flex-direction: column; gap: 4px; }


  #loadall-bar.active { display: flex; }


  .loadall-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }


  .loadall-fill { height: 100%; background: #34d399; border-radius: 2px; transition: width .3s; }


  .loadall-text { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; }





  /* TOP BAR */


  .tile-top { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 8px; background: linear-gradient(to bottom,rgba(0,0,0,.75),transparent); pointer-events: none; z-index: 20; }


  .badge-live { font-family: 'Space Mono',monospace; font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 2px 6px; border-radius: 3px; background: var(--live); color: #fff; }


  .badge-hd { font-family: 'Space Mono',monospace; font-size: 9px; padding: 2px 5px; border-radius: 3px; background: rgba(0,229,255,.2); border: 1px solid rgba(0,229,255,.4); color: var(--accent); }


  .badge-country { font-family: 'Space Mono',monospace; font-size: 10px; padding: 2px 6px; border-radius: 3px; background: rgba(0,0,0,.55); color: rgba(255,255,255,.85); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,.1); }





  /* BOTTOM BAR */


  .tile-bottom { position: absolute; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: flex-end; padding: 6px 8px; background: linear-gradient(to top,rgba(0,0,0,.85),transparent); z-index: 20; }


  .tile-username { font-size: 12px; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 55%; }


  .tile-viewers { font-family: 'Space Mono',monospace; font-size: 10px; color: rgba(255,255,255,.7); }


  .tile-viewers::before { content: '👁 '; }


  .tile-controls { display: flex; gap: 4px; pointer-events: all; }


  .tile-btn { width: 26px; height: 26px; border-radius: 4px; background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.15); color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; backdrop-filter: blur(4px); }


  .tile-btn:hover { background: rgba(255,255,255,.2); }


  .tile-btn.unmuted { background: rgba(0,229,255,.3); border-color: var(--accent); }


  .tile-btn.fav-active { color: var(--fav); border-color: var(--fav); background: rgba(245,158,11,.2); }





  /* META OVERLAY */


  .tile-meta { position: absolute; left: 0; right: 0; bottom: 44px; max-height: calc(100% - 80px); background: rgba(4,6,12,.93); backdrop-filter: blur(10px); opacity: 0; pointer-events: none; transition: opacity .18s, transform .18s; display: flex; flex-direction: column; padding: 8px 10px 6px; gap: 4px; overflow-y: auto; overflow-x: hidden; z-index: 12; transform: translateY(4px); border-top: 1px solid rgba(255,255,255,.07); }


  .tile-meta::-webkit-scrollbar { width: 3px; }


  .tile-meta::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }


  .tile-meta.visible { opacity: 1; pointer-events: all; transform: translateY(0); }


  .meta-header { display: flex; align-items: center; gap: 7px; flex-shrink: 0; padding-bottom: 4px; }


  .meta-name { font-family: 'Syne',sans-serif; font-weight: 800; font-size: 13px; color: #fff; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }


  .meta-divider { height: 1px; background: var(--border); flex-shrink: 0; margin: 1px 0; }


  .meta-row { display: flex; align-items: baseline; gap: 5px; font-family: 'Space Mono',monospace; font-size: 10px; line-height: 1.5; flex-shrink: 0; }


  .meta-icon { flex-shrink: 0; font-size: 10px; }


  .meta-label { color: var(--muted); white-space: nowrap; }


  .meta-val { color: var(--text); word-break: break-word; }


  .meta-quality-row { display: flex; flex-wrap: wrap; gap: 3px; flex-shrink: 0; }


  .meta-quality-badge { font-family: 'Space Mono',monospace; font-size: 9px; padding: 2px 6px; border-radius: 3px; background: rgba(0,229,255,.15); border: 1px solid rgba(0,229,255,.3); color: var(--accent); }


  .meta-tags { display: flex; flex-wrap: wrap; gap: 3px; flex-shrink: 0; padding-top: 1px; }


  .meta-tag { font-family: 'Space Mono',monospace; font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .15s; }


  .meta-tag:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.08); }


  .meta-spacer { flex: 1; min-height: 6px; }


  .meta-cta { flex-shrink: 0; }


  .cta-link { display: block; padding: 7px 12px; background: var(--accent2); color: #fff; text-decoration: none; border-radius: var(--radius); font-size: 11px; font-weight: 700; text-align: center; font-family: 'Space Mono',monospace; letter-spacing: .5px; box-shadow: 0 3px 16px rgba(255,61,113,.4); transition: transform .15s, box-shadow .15s; }


  .cta-link:hover { transform: scale(1.03); box-shadow: 0 5px 22px rgba(255,61,113,.6); }





  /* FAVORITES PANEL */


  #fav-panel { display: none; position: fixed; top: 0; right: 0; bottom: 0; width: 260px; z-index: 800; background: var(--surface); border-left: 1px solid var(--border); flex-direction: column; box-shadow: -10px 0 40px rgba(0,0,0,.5); }


  #fav-panel.open { display: flex; }


  .fav-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }


  .fav-title { font-size: 13px; font-weight: 800; }


  .fav-title span { color: var(--fav); }


  .fav-close { width: 26px; height: 26px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all .15s; }


  .fav-close:hover { border-color: var(--accent2); color: var(--accent2); }


  .fav-body { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }


  .fav-body::-webkit-scrollbar { width: 4px; }


  .fav-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }


  .fav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: border-color .15s; position: relative; }


  .fav-item:hover { border-color: var(--fav); }


  .fav-item.fav-online { border-color: rgba(0,229,255,.4); }


  .fav-item.fav-offline { opacity: 0.55; }


  .fav-snap { width: 52px; height: 30px; border-radius: 3px; background: var(--bg); background-size: cover; background-position: center; flex-shrink: 0; }


  .fav-info { flex: 1; min-width: 0; }


  .fav-name { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }


  .fav-status { font-family: 'Space Mono',monospace; font-size: 9px; color: var(--muted); margin-top: 2px; }


  .fav-status.online { color: var(--accent); }


  .fav-status.offline { color: var(--muted); }


  .fav-remove { width: 20px; height: 20px; border-radius: 3px; background: transparent; border: 1px solid transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all .15s; flex-shrink: 0; }


  .fav-remove:hover { border-color: var(--accent2); color: var(--accent2); }


  .fav-empty { font-family: 'Space Mono',monospace; font-size: 11px; color: var(--muted); text-align: center; margin-top: 40px; line-height: 1.8; }


  .fav-footer { padding: 10px; border-top: 1px solid var(--border); flex-shrink: 0; font-family: 'Space Mono',monospace; font-size: 10px; color: var(--muted); text-align: center; }





  /* EMPTY / LOADING */


  #empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 12px; color: var(--muted); font-size: 14px; }


  #empty-state .icon { font-size: 40px; opacity: .4; }


  @keyframes spin { to { transform: rotate(360deg); } }





  /* SCROLL SENTINEL */


  #scroll-sentinel { height: 48px; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--muted); font-family: 'Space Mono',monospace; font-size: 11px; margin-top: 4px; }


  .load-spinner { display: none; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }


  #scroll-sentinel.loading .load-spinner { display: inline-block; }





  .tile-error { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.7); font-size: 11px; color: var(--muted); font-family: 'Space Mono',monospace; z-index: 5; }


  .aff-input { width: 130px !important; }





  /* STATS MODAL */


  #stats-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); align-items: center; justify-content: center; }


  #stats-modal.open { display: flex; }


  .stats-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: 560px; max-width: 95vw; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.6); }


  .stats-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }


  .stats-title { font-size: 15px; font-weight: 800; letter-spacing: -.3px; }


  .stats-title span { color: var(--accent); }


  .stats-close { width: 28px; height: 28px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all .15s; }


  .stats-close:hover { border-color: var(--accent2); color: var(--accent2); }


  .stats-body { overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 20px; }


  .stats-body::-webkit-scrollbar { width: 4px; }


  .stats-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }


  .stats-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }


  .kpi { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }


  .kpi-val { font-family: 'Space Mono',monospace; font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 4px; }


  .kpi-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }


  .stats-section-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-family: 'Space Mono',monospace; }


  .stats-bar-list { display: flex; flex-direction: column; gap: 6px; }


  .stats-bar-row { display: flex; align-items: center; gap: 8px; font-family: 'Space Mono',monospace; font-size: 10px; }


  .stats-bar-label { width: 80px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; cursor: pointer; }


  .stats-bar-label:hover { color: var(--accent); }


  .stats-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }


  .stats-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .4s; }


  .stats-bar-fill.pink { background: var(--accent2); }


  .stats-bar-fill.purple { background: #a78bfa; }


  .stats-bar-count { width: 40px; text-align: right; color: var(--muted); }


  .stats-tag-cloud { display: flex; flex-wrap: wrap; gap: 5px; }


  .stats-tag { font-family: 'Space Mono',monospace; font-size: 9px; padding: 3px 8px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 4px; }


  .stats-tag:hover { border-color: var(--accent); color: var(--accent); }


  .stats-tag .tag-count { color: var(--accent); font-weight: 700; }


  .stats-updated { font-family: 'Space Mono',monospace; font-size: 10px; color: var(--muted); text-align: right; }




  /* -- SOURCE TABS -- */

  .source-tabs {

    display: flex;

    gap: 4px;

    background: var(--surface2);

    border: 1px solid var(--border);

    border-radius: var(--radius);

    padding: 3px;

    flex-shrink: 0;

  }

  .source-tab {

    padding: 5px 14px;

    border-radius: 4px;

    font-family: 'Space Mono', monospace;

    font-size: 11px;

    font-weight: 700;

    letter-spacing: .5px;

    cursor: pointer;

    border: none;

    background: transparent;

    color: var(--muted);

    transition: all .2s;

    text-transform: uppercase;

  }

  .source-tab.active {

    background: var(--accent);

    color: #000;

  }

  .source-tab:not(.active):hover { color: var(--text); }



  /* Cam-only controls (hidden in STREAMS mode) */

  .cam-controls { display: none; }

  body.source-cams .cam-controls { display: flex; align-items: center; gap: 6px; }

  body.source-cams .stream-controls { display: none; }



  /* -- CAM TILE STATUS BADGE -- */

  .badge-status {

    font-family: 'Space Mono', monospace;

    font-size: 9px;

    font-weight: 700;

    letter-spacing: 1px;

    padding: 2px 6px;

    border-radius: 3px;

  }

  .badge-status.active  { background: #00e5a0; color: #000; }

  .badge-status.idle    { background: #f59e0b; color: #000; }

  .badge-status.unknown { background: #4a5568; color: #fff; }



  /* Motion score bar */

  .motion-bar-wrap {

    position: absolute;

    bottom: 0; left: 0; right: 0;

    height: 3px;

    background: rgba(255,255,255,.1);

  }

  .motion-bar {

    height: 100%;

    background: #00e5a0;

    transition: width .5s ease;

  }



  /* Cam snapshot img */

  .tile-cam-img {

    width: 100%; height: 100%;

    object-fit: cover;

    display: block;

    background: #000;

  }


  /* SOURCE TABS */


  .source-tabs { display:flex; gap:4px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:3px; flex-shrink:0; }


  .source-tab { padding:5px 14px; border-radius:4px; font-family:'Space Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.5px; cursor:pointer; border:none; background:transparent; color:var(--muted); transition:all .2s; text-transform:uppercase; }


  .source-tab.active { background:var(--accent); color:#000; }


  .source-tab:not(.active):hover { color:var(--text); }


  .cam-controls { display:none; align-items:center; gap:6px; flex-wrap:wrap; }


  body.source-cams .cam-controls { display:flex; }


  body.source-cams .stream-controls { display:none; }


  .tile-cam-img { width:100%; height:100%; object-fit:cover; display:block; background:#000; }
  .cam-nosignal { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#ff4444; font-size:11px; font-weight:700; letter-spacing:2px; opacity:0.7; pointer-events:none; }


  .badge-status { font-family:'Space Mono',monospace; font-size:9px; font-weight:700; letter-spacing:1px; padding:2px 6px; border-radius:3px; }


  .badge-status.active  { background:#00e5a0; color:#000; }


  .badge-status.idle    { background:#f59e0b; color:#000; }


  .badge-status.unknown { background:#4a5568; color:#fff; }


  .badge-status.dead    { background:#333; color:#666; }


  .motion-bar-wrap { position:absolute; bottom:0; left:0; right:0; height:3px; background:rgba(255,255,255,.1); }


  .motion-bar { height:100%; background:#00e5a0; transition:width .5s ease; }
  .tile.active-audio .tile-snapshot { opacity: 0 !important; pointer-events: none; }



  /* Mobile nav pills (horizontal scroll row) */
  .nav-pill {
    flex-shrink: 0;
    padding: 8px 16px;

<script>


// ── STATE ──────────────────────────────────────────────────────────────────


const hlsInstances   = new Map();   // username -> Hls instance


let refreshTimer     = null;


let allPaused        = false;


let currentOffset    = 0;


let isLoadingMore    = false;


let hasMore          = true;


let allModels        = [];
let apiOffset        = 0;           // how far into the full API we've paged
let isBgFetching     = false;
          // full fetched pool


let currentFiltered  = [];          // post-filter slice


let infiniteObserver = null;


let focusedIndex     = -1;


let vpObserver       = null;        // viewport pause IntersectionObserver


const vpPauseDelay   = new Map();   // username -> setTimeout id for deferred pause


let favWatchTimer    = null;


const BATCH          = 16;


const API            = 'https://go.stripchat.com/api/models';





// ── FAVORITES (localStorage) ───────────────────────────────────────────────


function getFavs() {


  try { return JSON.parse(localStorage.getItem('lg_favs') || '{}'); } catch { return {}; }


}


function saveFavs(obj) {


  try { localStorage.setItem('lg_favs', JSON.stringify(obj)); } catch {}


}


function isFav(username) { return !!getFavs()[username]; }





function toggleFav(username, model) {


  const favs = getFavs();


  if (favs[username]) {


    delete favs[username];


  } else {


    favs[username] = {


      username,


      snapshotUrl: model.snapshotUrl || model.widgetPreviewUrl || '',


      addedAt: Date.now(),


      lastSeenOnline: Date.now()


    };


  }


  saveFavs(favs);


  // Update all fav buttons for this user in the grid


  document.querySelectorAll(`.tile[data-username="${username}"] .tile-btn-fav`).forEach(btn => {


    updateFavBtn(btn, !!favs[username]);


  });


  // Update tile border


  document.querySelectorAll(`.tile[data-username="${username}"]`).forEach(tile => {


    tile.classList.toggle('favorited', !!favs[username]);


  });


  renderFavPanel();


}





function updateFavBtn(btn, active) {


  if (active) {


    btn.classList.add('fav-active');


    btn.textContent = '♥';


    btn.title = 'Remove from favorites';


  } else {


    btn.classList.remove('fav-active');


    btn.textContent = '♥';


    btn.title = 'Add to favorites';


  }


}





function toggleFavPanel() {


  const panel = document.getElementById('fav-panel');


  panel.classList.toggle('open');


  if (panel.classList.contains('open')) renderFavPanel();


}





function renderFavPanel() {


  const favs = getFavs();


  const body = document.getElementById('fav-body');


  const footer = document.getElementById('fav-footer');


  body.innerHTML = '';





  const usernames = Object.keys(favs);


  if (!usernames.length) {


    body.innerHTML = '<div class="fav-empty">No favorites yet.<br>Click ♡ on any tile<br>to add a favorite.</div>';


    footer.textContent = '';


    return;


  }





  const onlineSet = new Set(allModels.map(m => m.username));





  // Sort: online first, then alphabetical


  usernames.sort((a, b) => {


    const ao = onlineSet.has(a), bo = onlineSet.has(b);


    if (ao !== bo) return ao ? -1 : 1;


    return a.localeCompare(b);


  });





  usernames.forEach(username => {


    const fav = favs[username];


    const online = onlineSet.has(username);


    const item = document.createElement('div');


    item.className = `fav-item ${online ? 'fav-online' : 'fav-offline'}`;





    const snap = document.createElement('div');


    snap.className = 'fav-snap';


    if (fav.snapshotUrl) snap.style.backgroundImage = `url(${fav.snapshotUrl})`;





    const info = document.createElement('div');


    info.className = 'fav-info';





    const name = document.createElement('div');


    name.className = 'fav-name';


    name.textContent = username;





    const status = document.createElement('div');


    status.className = `fav-status ${online ? 'online' : 'offline'}`;


    if (online) {


      const m = allModels.find(x => x.username === username);


      status.textContent = m ? `🟢 LIVE · 👁 ${fmtViewers(m.viewersCount)}` : '🟢 LIVE';


    } else {


      const last = fav.lastSeenOnline;


      const ago = last ? fmtAgo(Date.now() - last) : 'unknown';


      status.textContent = `⚫ Offline · last seen ${ago}`;


    }





    const removeBtn = document.createElement('button');


    removeBtn.className = 'fav-remove';


    removeBtn.textContent = '✕';


    removeBtn.title = 'Remove favorite';


    removeBtn.onclick = e => { e.stopPropagation(); toggleFav(username, fav); };





    info.appendChild(name);


    info.appendChild(status);


    item.appendChild(snap);


    item.appendChild(info);


    item.appendChild(removeBtn);





    // Click → open room


    item.onclick = () => window.open(buildAffUrl(username), '_blank', 'noopener');


    body.appendChild(item);


  });





  const onlineCount = usernames.filter(u => onlineSet.has(u)).length;


  footer.textContent = `${onlineCount} / ${usernames.length} online · checks every 5min`;


}





function fmtAgo(ms) {


  const s = Math.floor(ms / 1000);


  if (s < 60) return `${s}s ago`;


  const m = Math.floor(s / 60);


  if (m < 60) return `${m}m ago`;


  const h = Math.floor(m / 60);


  if (h < 24) return `${h}h ago`;


  return `${Math.floor(h/24)}d ago`;


}





// Update lastSeenOnline for online favorites when we refresh


function updateFavOnlineStatus() {


  const favs = getFavs();


  const onlineSet = new Set(allModels.map(m => m.username));


  let changed = false;


  Object.keys(favs).forEach(u => {


    if (onlineSet.has(u)) {


      favs[u].lastSeenOnline = Date.now();


      changed = true;


    }


  });


  if (changed) saveFavs(favs);


  if (document.getElementById('fav-panel').classList.contains('open')) renderFavPanel();


}





// Background watcher: refetch and check fav status every 5 min


function startFavWatcher() {


  if (favWatchTimer) clearInterval(favWatchTimer);


  favWatchTimer = setInterval(async () => {


    const favs = getFavs();


    if (!Object.keys(favs).length) return;


    // Light fetch: just get top 500 to check presence


    try {


      const r = await fetch(`${API}?limit=500&sortBy=viewersCount`, { headers: { Accept: 'application/json' } });


      if (!r.ok) return;


      const data = await r.json();


      const onlineSet = new Set((data.models || []).map(m => m.username));


      const f2 = getFavs();


      Object.keys(f2).forEach(u => { if (onlineSet.has(u)) f2[u].lastSeenOnline = Date.now(); });


      saveFavs(f2);


      if (document.getElementById('fav-panel').classList.contains('open')) renderFavPanel();


    } catch {}


  }, 5 * 60 * 1000);


}





// ── VIEWPORT PAUSE/RESUME ─────────────────────────────────────────────────


// When a tile scrolls out of view for >2s, pause its HLS to save bandwidth.


// When it scrolls back in, resume immediately.


function setupViewportObserver() {


  if (vpObserver) vpObserver.disconnect();


  vpObserver = new IntersectionObserver(entries => {


    entries.forEach(entry => {


      const tile = entry.target;


      const username = tile.dataset.username;


      if (!username) return;


      if (entry.isIntersecting) {


        // Cancel any pending pause


        if (vpPauseDelay.has(username)) {


          clearTimeout(vpPauseDelay.get(username));


          vpPauseDelay.delete(username);


        }


        // Resume if paused


        if (tile.classList.contains('vp-paused')) {


          tile.classList.remove('vp-paused');


          const hls = hlsInstances.get(username);


          if (hls) {


            hls.startLoad();


            tile.querySelector('video')?.play().catch(() => {});


          }


        }


      } else {


        // Debounce: only pause after 2s off-screen (avoid thrashing during scroll)


        if (!vpPauseDelay.has(username)) {


          const id = setTimeout(() => {


            vpPauseDelay.delete(username);


            if (tile.classList.contains('vp-paused')) return; // already paused


            tile.classList.add('vp-paused');


            const hls = hlsInstances.get(username);


            if (hls) {


              tile.querySelector('video')?.pause();


              hls.stopLoad();


            }


          }, 2000);


          vpPauseDelay.set(username, id);


        }


      }


    });


  }, {


    root: document.getElementById('grid-wrapper'),


    rootMargin: '100px',   // pre-load 100px before entering viewport


    threshold: 0.01


  });


  // Observe all current tiles


  document.querySelectorAll('#grid .tile').forEach(t => vpObserver.observe(t));


}





// ── HELPERS ────────────────────────────────────────────────────────────────


function muteAll() {


  document.querySelectorAll('video').forEach(v => v.muted = true);


  document.querySelectorAll('.tile-btn.unmuted').forEach(b => { b.classList.remove('unmuted'); b.textContent = '🔇'; });


  document.querySelectorAll('.tile').forEach(t => { t.classList.remove('active-audio'); });


  document.getElementById('grid-wrapper').classList.remove('has-active-audio');


}





function togglePauseAll() {


  allPaused = !allPaused;


  const btn = document.getElementById('pauseAllBtn');


  document.querySelectorAll('video').forEach(v => { if (allPaused) v.pause(); else v.play().catch(() => {}); });


  btn.textContent = allPaused ? '? Play All' : '? Pause All';


}





function fmtViewers(n) {


  if (!n) return '0';


  if (n >= 1000) return (n/1000).toFixed(1) + 'K';


  return String(n);


}





function fmtNum(n) {


  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';


  if (n >= 1000) return (n/1000).toFixed(1) + 'K';


  return String(n);


}





function fmtTime(seconds) {


  if (!seconds || seconds < 0) return null;


  const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60);


  if (h > 0) return `${h}h ${m}m`;


  if (m > 0) return `${m}m`;


  return '<1m';


}





function buildAffUrl(username) {


  const aff = document.getElementById('affId').value.trim();


  return aff ? `https://stripchat.com/${username}?campaign=${encodeURIComponent(aff)}` : `https://stripchat.com/${username}`;


}





function getCountryFlag(code) {


  if (!code || code.length !== 2) return '';


  return [...code.toUpperCase()].map(c => String.fromCodePoint(c.charCodeAt(0)+127397)).join('');


}





function genderParam(val) {


  if (!val) return {};


  return { gender: val };


}





function destroyAll() {


  // Cancel all pending viewport pauses


  vpPauseDelay.forEach(id => clearTimeout(id));


  vpPauseDelay.clear();


  if (vpObserver) { vpObserver.disconnect(); vpObserver = null; }


  hlsInstances.forEach(h => { try { h.destroy(); } catch(e){} });


  hlsInstances.clear();


  document.querySelectorAll('video').forEach(v => { v.pause(); v.src=''; v.removeAttribute('src'); });


  document.getElementById('grid-wrapper').classList.remove('has-active-audio');


  focusedIndex = -1;


  updateDpadPos();


}





function setTagFilter(tag) {


  document.getElementById('tagInput').value = tag;


  loadStreams();


}





// ── UNMUTE TILE ────────────────────────────────────────────────────────────


function unmuteTile(tile, explicitBtn) {


  const video = tile.querySelector('video');


  if (!video) return;


  document.querySelectorAll('video').forEach(v => v.muted = true);


  document.querySelectorAll('.tile-btn.unmuted').forEach(b => { b.classList.remove('unmuted'); b.textContent = '🔇'; });


  document.querySelectorAll('.tile').forEach(t => { t.classList.remove('active-audio'); t.style.order = ''; });


  video.muted = false;


  const muteBtn = explicitBtn || tile.querySelector('.tile-btn');


  if (muteBtn) { muteBtn.classList.add('unmuted'); muteBtn.textContent = '🔊'; }


  tile.classList.add('active-audio');


  document.getElementById('grid-wrapper').classList.add('has-active-audio');


}





// ── D-PAD NAVIGATION ──────────────────────────────────────────────────────


function getVisibleTiles() { return [...document.querySelectorAll('#grid .tile')]; }


function getCols() { return parseInt(Math.sqrt(parseInt(document.getElementById('gridSelect').value))); }





function updateDpadPos() {


  const tiles = getVisibleTiles();


  const el = document.getElementById('dpad-pos');


  if (focusedIndex < 0 || focusedIndex >= tiles.length) { el.textContent = '�'; return; }


  const cols = getCols();


  el.textContent = `${Math.floor(focusedIndex/cols)+1},${(focusedIndex%cols)+1}`;


}





function focusTile(idx) {


  const tiles = getVisibleTiles();


  if (idx < 0 || idx >= tiles.length) return;


  tiles.forEach(t => t.classList.remove('focused'));


  focusedIndex = idx;


  const tile = tiles[idx];


  tile.classList.add('focused');


  unmuteTile(tile);


  tile.scrollIntoView({ behavior: 'smooth', block: 'nearest' });


  updateDpadPos();


}





function dpadMove(dir) {


  const tiles = getVisibleTiles();


  if (!tiles.length) return;


  const cols = getCols();


  let idx = focusedIndex < 0 ? 0 : focusedIndex;


  if (dir === 'up')    idx = Math.max(0, idx - cols);


  if (dir === 'down')  idx = Math.min(tiles.length - 1, idx + cols);


  if (dir === 'left')  idx = Math.max(0, idx - 1);


  if (dir === 'right') idx = Math.min(tiles.length - 1, idx + 1);


  focusTile(idx);


}





document.getElementById('dpad-up').onclick    = () => dpadMove('up');


document.getElementById('dpad-down').onclick  = () => dpadMove('down');


document.getElementById('dpad-left').onclick  = () => dpadMove('left');


document.getElementById('dpad-right').onclick = () => dpadMove('right');


document.addEventListener('keydown', e => {
  const fsOpen = document.getElementById('fs-overlay')?.classList.contains('open');
  if (fsOpen) {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); _fsNav(-1); return; }
    if (e.key === 'ArrowRight') { e.preventDefault(); _fsNav(1);  return; }
    if (e.key === 'Escape')     { e.preventDefault(); closeFsOverlay(); return; }
    return;
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault();
    dpadMove({ ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right' }[e.key]);
  }
});





// ── COUNTRY DROPDOWN ──────────────────────────────────────────────────────


function populateCountryFilter(models) {


  const sel = document.getElementById('countrySelect');


  const current = sel.value;


  const counts = {};


  models.forEach(m => { if (m.country) counts[m.country] = (counts[m.country]||0)+1; });


  while (sel.options.length > 1) sel.remove(1);


  Object.entries(counts).sort((a,b) => b[1]-a[1]).forEach(([code, cnt]) => {


    const opt = document.createElement('option');


    opt.value = code;


    opt.textContent = `${getCountryFlag(code)} ${code.toUpperCase()} (${cnt})`;


    sel.appendChild(opt);


  });


  if (current) sel.value = current;


}





function applyCountryFilter(models) {


  const country = document.getElementById('countrySelect').value;


  return country ? models.filter(m => m.country === country) : models;


}





// ── FETCH 1500 (3x parallel) ───────────────────────────────────────────────


async function loadStreams() {


  const gender = document.getElementById('genderSelect').value;


  const sort   = document.getElementById('sortSelect').value;


  const tag    = document.getElementById('tagInput').value.trim();





  document.getElementById('statusText').textContent = 'Loading?';





  const baseParams = { sortBy: sort, ...genderParam(gender) };


  if (tag) baseParams.tag = tag;





  try {


    const p0 = new URLSearchParams({ ...baseParams, limit: 200, offset: 0 });
    const data0 = await fetch(`${API}?${p0}`, { headers: { Accept: 'application/json' } })
      .then(r => r.ok ? r.json() : { models: [], count: 0 })
      .catch(() => ({ models: [], count: 0 }));
    if (data0.count) apiTotal = data0.count;
    apiOffset = 200;
    const seen = new Set();
    let models = [];
    (data0.models || []).forEach(m => { if (!seen.has(m.username)) { seen.add(m.username); models.push(m); } });
    models = models.filter(m => m.status === 'public' && m.stream && m.stream.urls);


    models.forEach(m => { if (!m.country && m.modelsCountry) m.country = m.modelsCountry; });


    if (gender) models = models.filter(m => m.gender === gender);


    allModels = models;


  } catch(e) {


    document.getElementById('statusText').textContent = 'API error ? retry';


    console.error(e);


    return;


  }





  updateFavOnlineStatus();


  populateCountryFilter(allModels);


  renderGrid();
  backgroundPrefetch();





  const bar = document.getElementById('refreshBar');


  bar.style.animation = 'none'; bar.offsetHeight;


  bar.style.animation = 'drain 60s linear forwards';


  clearTimeout(refreshTimer);


  refreshTimer = setTimeout(diffRefresh, 60000);


}





// ── DIFF-BASED AUTO-REFRESH ────────────────────────────────────────────────


// Background fetch, diff against current grid, only add/remove/update � never destroyAll


async function diffRefresh() {


  const gender = document.getElementById('genderSelect').value;


  const sort   = document.getElementById('sortSelect').value;


  const tag    = document.getElementById('tagInput').value.trim();


  const quality = document.getElementById('qualitySelect').value;


  const baseParams = { sortBy: sort, ...genderParam(gender) };


  if (tag) baseParams.tag = tag;





  let freshModels = [];


  try {


    const pRef = new URLSearchParams({ ...baseParams, limit: 200, offset: 0 });
    const dataRef = await fetch(`${API}?${pRef}`, { headers: { Accept: 'application/json' } })
      .then(r => r.ok ? r.json() : { models: [] })
      .catch(() => ({ models: [] }));
    const seen = new Set();
    (dataRef.models || []).forEach(m => { if (!seen.has(m.username)) { seen.add(m.username); freshModels.push(m); } });
    freshModels = freshModels.filter(m => m.status === 'public' && m.stream && m.stream.urls);


    freshModels.forEach(m => { if (!m.country && m.modelsCountry) m.country = m.modelsCountry; });


    if (gender) freshModels = freshModels.filter(m => m.gender === gender);


  } catch { /* silently skip, retry next cycle */ }





  if (!freshModels.length) {


    // Retry in 30s if fetch failed


    clearTimeout(refreshTimer);


    refreshTimer = setTimeout(diffRefresh, 30000);


    return;


  }





  // MERGE: replace top-200 with fresh data, preserve deep-paged tail untouched
  const freshMap2 = new Map(freshModels.map(m => [m.username, m]));
  const deepTail = allModels.slice(200).filter(m => !freshMap2.has(m.username)); // deep models not in fresh top-200
  // Fresh models first (sorted/current), then deep tail preserved as-is
  allModels = [...freshModels, ...deepTail];


  updateFavOnlineStatus();


  populateCountryFilter(allModels);





  // Update status text + reset bar


  document.getElementById('statusText').textContent = `${allModels.length} streams · ${new Date().toLocaleTimeString()}`;


  const bar = document.getElementById('refreshBar');


  bar.style.animation = 'none'; bar.offsetHeight;


  bar.style.animation = 'drain 60s linear forwards';





  // Now diff the visible grid


  const grid = document.getElementById('grid');


  const country = document.getElementById('countrySelect').value;


  const filtered = country ? freshModels.filter(m => m.country === country) : freshModels;


  const freshMap = new Map(filtered.map(m => [m.username, m]));





  // Remove tiles that are no longer in the fresh list


  grid.querySelectorAll('.tile').forEach(tile => {


    const u = tile.dataset.username;


    if (!freshMap.has(u)) {


      // Fade out and remove


      tile.style.transition = 'opacity .4s';


      tile.style.opacity = '0';


      const hls = hlsInstances.get(u);


      if (hls) { try { hls.destroy(); } catch {} hlsInstances.delete(u); }


      setTimeout(() => tile.remove(), 420);


    }


  });





  // Update viewer counts on existing tiles


  grid.querySelectorAll('.tile').forEach(tile => {


    const u = tile.dataset.username;


    const fresh = freshMap.get(u);


    if (fresh) {


      const viewEl = tile.querySelector('.tile-viewers');


      if (viewEl) viewEl.textContent = fmtViewers(fresh.viewersCount);


    }


  });





  // Add new models that don't have tiles yet (append to end)


  const existingUsernames = new Set([...grid.querySelectorAll('.tile')].map(t => t.dataset.username));


  filtered.forEach(m => {


    if (!existingUsernames.has(m.username)) {


      const tile = buildTile(m, quality);


      tile.style.opacity = '0';


      tile.style.transition = 'opacity .4s';


      grid.appendChild(tile);


      vpObserver?.observe(tile);


      requestAnimationFrame(() => { requestAnimationFrame(() => { tile.style.opacity = '1'; }); });


    }


  });





  clearTimeout(refreshTimer);


  refreshTimer = setTimeout(diffRefresh, 60000);


}

async function backgroundPrefetch() {
  if (isBgFetching) return;
  isBgFetching = true;
  const gender = document.getElementById('genderSelect').value;
  const sort   = document.getElementById('sortSelect').value;
  const tag    = document.getElementById('tagInput').value.trim();
  const baseParams = { limit: 200, sortBy: sort, ...genderParam(gender) };
  if (tag) baseParams.tag = tag;
  const seen = new Set(allModels.map(m => m.username));
  for (let off = 200; off <= 800; off += 200) {
    if (apiOffset > off) continue; // already have this page
    try {
      const p = new URLSearchParams({ ...baseParams, offset: off });
      const data = await fetch(`${API}?${p}`, { headers: { Accept: 'application/json' } })
        .then(r => r.ok ? r.json() : { models: [] })
        .catch(() => ({ models: [] }));
      let added = 0;
      (data.models || []).forEach(m => {
        if (!seen.has(m.username) && m.status === 'public' && m.stream && m.stream.urls) {
          if (!m.country && m.modelsCountry) m.country = m.modelsCountry;
          if (!gender || m.gender === gender) {
            seen.add(m.username);
            allModels.push(m);
            added++;
          }
        }
      });
      apiOffset = off + 200;
      if (added > 0) {
        populateCountryFilter(allModels);
        document.getElementById('statusText').textContent = `${allModels.length} streams · ${new Date().toLocaleTimeString()}`;
      }
      if (!data.models || data.models.length < 200) break; // end of data
    } catch(e) { break; }
  }
  isBgFetching = false;
}

async function fetchNextApiPage() {
  if (isBgFetching) return;
  isBgFetching = true;
  const gender = document.getElementById('genderSelect').value;
  const sort   = document.getElementById('sortSelect').value;
  const tag    = document.getElementById('tagInput').value.trim();
  const baseParams = { limit: 200, sortBy: sort, ...genderParam(gender) };
  if (tag) baseParams.tag = tag;
  const seen = new Set(allModels.map(m => m.username));
  try {
    const p = new URLSearchParams({ ...baseParams, offset: apiOffset });
    const data = await fetch(`${API}?${p}`, { headers: { Accept: 'application/json' } })
      .then(r => r.ok ? r.json() : { models: [] })
      .catch(() => ({ models: [] }));
    let added = 0;
    (data.models || []).forEach(m => {
      if (!seen.has(m.username) && m.status === 'public' && m.stream && m.stream.urls) {
        if (!m.country && m.modelsCountry) m.country = m.modelsCountry;
        if (!gender || m.gender === gender) {
          seen.add(m.username);
          allModels.push(m);
          added++;
        }
      }
    });
    apiOffset += 200;
    if (added > 0) {
      currentFiltered = applyCountryFilter(allModels);
      hasMore = currentOffset < currentFiltered.length || (apiTotal ? apiOffset < apiTotal : data.models.length === 200);
      document.getElementById('statusText').textContent = `${allModels.length} streams · ${new Date().toLocaleTimeString()}`;
    } else {
      hasMore = false;
    }
  } catch(e) { hasMore = false; }
  isBgFetching = false;
}





// ── LOAD ALL (paginate until done) ─────────────────────────────────────────


let loadAllAbort = false;


async function loadAll() {


  const btn = document.getElementById('loadAllBtn');


  if (btn.textContent.includes('Cancel')) {


    loadAllAbort = true;


    btn.textContent = '▶ Load All';


    document.getElementById('loadall-bar').classList.remove('active');


    return;


  }





  loadAllAbort = false;


  btn.textContent = '✕ Cancel';


  document.getElementById('loadall-bar').classList.add('active');





  const gender = document.getElementById('genderSelect').value;


  const sort   = document.getElementById('sortSelect').value;


  const tag    = document.getElementById('tagInput').value.trim();


  const quality = document.getElementById('qualitySelect').value;


  const baseParams = { limit: 500, sortBy: sort, ...genderParam(gender) };


  if (tag) baseParams.tag = tag;





  const seen = new Set(allModels.map(m => m.username));


  let offset = 0;


  let totalFetched = allModels.length;


  let grandTotal = null;





  const updateBar = (fetched, total) => {


    document.getElementById('loadall-count').textContent = `${fetched}${total ? ' / ~' + total : ''}`;


    document.getElementById('loadall-fill').style.width = total ? `${Math.min(100, Math.round(fetched/total*100))}%` : '50%';


    document.getElementById('loadall-label').textContent = 'Loading all streams�';


    document.getElementById('statusText').textContent = `Fetched ${fetched} streams�`;


  };





  // Batch 5 requests at a time to avoid hammering the API


  while (!loadAllAbort) {


    const offsets = [0,1,2,3,4].map(i => offset + i*500);


    const pages = await Promise.all(offsets.map(o => {


      const p = new URLSearchParams({ ...baseParams, offset: o });


      return fetch(`${API}?${p}`, { headers: { Accept: 'application/json' } })


        .then(r => r.ok ? r.json() : { models: [], count: 0 })


        .catch(() => ({ models: [], count: 0 }));


    }));





    let anyNew = false;


    let maxCount = 0;


    pages.forEach(data => {


      if (data.count) maxCount = Math.max(maxCount, data.count);


      (data.models || []).forEach(m => {


        if (!seen.has(m.username) && m.status === 'public' && m.stream && m.stream.urls) {


          if (!m.country && m.modelsCountry) m.country = m.modelsCountry;


          if (!gender || m.gender === gender) {


            seen.add(m.username);


            allModels.push(m);


            anyNew = true;


            totalFetched++;


          }


        }


      });


    });





    if (maxCount) grandTotal = maxCount;





    // Check if any page returned < 500 � we've hit the end


    const hitEnd = pages.some(p => (p.models || []).length < 500);





    updateBar(totalFetched, grandTotal);





    // Render new models into grid immediately


    const country = document.getElementById('countrySelect').value;


    const newFiltered = allModels.filter(m => !currentFiltered.find(x => x.username === m.username));


    newFiltered.forEach(m => {


      if (country && m.country !== country) return;


      const tile = buildTile(m, quality);


      tile.style.opacity = '0';


      tile.style.transition = 'opacity .3s';


      document.getElementById('grid').appendChild(tile);


      vpObserver?.observe(tile);


      requestAnimationFrame(() => { requestAnimationFrame(() => { tile.style.opacity = '1'; }); });


    });


    currentFiltered = applyCountryFilter(allModels);


    currentOffset = currentFiltered.length;





    if (!anyNew || hitEnd) break;


    offset += 2500; // 5 pages � 500


    await new Promise(r => setTimeout(r, 300)); // polite delay between batches


  }





  loadAllAbort = false;


  btn.textContent = '▶ Load All';


  document.getElementById('loadall-bar').classList.remove('active');


  document.getElementById('statusText').textContent = `${allModels.length} streams · ${new Date().toLocaleTimeString()}`;


  populateCountryFilter(allModels);


}





// ── RENDER GRID ────────────────────────────────────────────────────────────


function renderGrid() {


  destroyAll();


  const count   = parseInt(document.getElementById('gridSelect').value);


  const cols    = Math.sqrt(count);


  const quality = document.getElementById('qualitySelect').value;


  const grid    = document.getElementById('grid');


  const empty   = document.getElementById('empty-state');


  const sentinel = document.getElementById('scroll-sentinel');





  grid.innerHTML = '';


  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;


  allPaused = false;


  document.getElementById('pauseAllBtn').textContent = '▮▮ Pause All';





  currentFiltered = applyCountryFilter(allModels);





  if (!currentFiltered.length) {


    empty.style.display = 'flex';


    sentinel.style.display = 'none';


    document.getElementById('statusText').textContent = 'No streams found';


    return;


  }


  empty.style.display = 'none';





  const firstBatch = currentFiltered.slice(0, count);


  currentOffset = firstBatch.length;


  firstBatch.forEach(m => grid.appendChild(buildTile(m, quality)));





  hasMore = currentOffset < currentFiltered.length;


  sentinel.style.display = 'flex';


  sentinel.classList.remove('loading');


  sentinel.querySelector('.sentinel-text').textContent = hasMore ? 'Scroll for more' : '';


  document.getElementById('statusText').textContent = `${currentFiltered.length} streams · ${new Date().toLocaleTimeString()}`;





  setupInfiniteScroll();


  setupViewportObserver();


}





// ── INFINITE SCROLL ────────────────────────────────────────────────────────


function setupInfiniteScroll() {


  if (infiniteObserver) infiniteObserver.disconnect();


  const sentinel = document.getElementById('scroll-sentinel');


  infiniteObserver = new IntersectionObserver(entries => {


    if (entries[0].isIntersecting) { if (currentSource === 'cams') loadMoreCams(); else if (!isLoadingMore && hasMore) loadMoreTiles(); }


  }, { root: document.getElementById('grid-wrapper'), rootMargin: '200px', threshold: 0.1 });


  infiniteObserver.observe(sentinel);


}





async function loadMoreTiles() {


  if (isLoadingMore || !hasMore) return;


  isLoadingMore = true;


  const sentinel = document.getElementById('scroll-sentinel');


  sentinel.classList.add('loading');


  sentinel.querySelector('.sentinel-text').textContent = 'Loading�';


  await new Promise(r => setTimeout(r, 250));


  const quality = document.getElementById('qualitySelect').value;


  const grid = document.getElementById('grid');


  const batch = currentFiltered.slice(currentOffset, currentOffset + BATCH);


  batch.forEach(m => {


    const tile = buildTile(m, quality);


    grid.appendChild(tile);


    vpObserver?.observe(tile); // wire new tiles into viewport observer


  });


  currentOffset += batch.length;


  hasMore = currentOffset < currentFiltered.length;


  sentinel.classList.remove('loading');


  sentinel.querySelector('.sentinel-text').textContent = hasMore ? 'Scroll for more' : `All ${currentFiltered.length} streams loaded`;


  if (!hasMore) setTimeout(() => { sentinel.style.display = 'none'; }, 3000);


  isLoadingMore = false;


}





// ── BUILD TILE ─────────────────────────────────────────────────────────────


function buildTile(model, quality) {


  const streamUrl = model.stream.urls[quality] || model.stream.urls['original'] || model.stream.url;


  const tile = document.createElement('div');


  tile.className = 'tile';


  tile.dataset.username = model.username;


  if (isFav(model.username)) tile.classList.add('favorited');





  const snap = document.createElement('div');


  snap.className = 'tile-snapshot';


  const snapUrl = model.snapshotUrl || model.widgetPreviewUrl;


  if (snapUrl) snap.style.backgroundImage = `url(${snapUrl})`;





  const video = document.createElement('video');


  video.muted = true; video.autoplay = true; video.playsInline = true;





  if (Hls.isSupported()) {


    const hls = new Hls({


      maxBufferLength: 30, maxMaxBufferLength: 60, enableWorker: true,


      strictManifestParsing: false,


      manifestLoadingTimeOut: 10000, manifestLoadingMaxRetry: 4,


      levelLoadingTimeOut: 10000, levelLoadingMaxRetry: 4,


      fragLoadingTimeOut: 20000, fragLoadingMaxRetry: 6


    });


    hls.loadSource(streamUrl);


    hls.attachMedia(video);


    hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); snap.classList.add('hidden'); });


    hls.on(Hls.Events.ERROR, (_, data) => {


      if (!data.fatal) return;


      if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {


        hls.startLoad();


      } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {


        hls.recoverMediaError();


      } else {


        const e = document.createElement('div'); e.className='tile-error'; e.textContent='Stream ended'; tile.appendChild(e);


      }


    });


    video.addEventListener('waiting', () => { try { hls.startLoad(); } catch {} });


    hlsInstances.set(model.username, hls);


  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {


    video.src = streamUrl;


    video.addEventListener('loadeddata', () => snap.classList.add('hidden'));


  }





  // TOP BAR


  const top = document.createElement('div'); top.className = 'tile-top';


  const topLeft = document.createElement('div'); topLeft.style.cssText='display:flex;gap:4px;align-items:center;pointer-events:none;';

  top.appendChild(topLeft); top.appendChild(topRight);





  // BOTTOM BAR

  const nameEl = document.createElement('div'); nameEl.className='tile-username'; nameEl.textContent=model.username;


  const viewEl = document.createElement('div'); viewEl.className='tile-viewers'; viewEl.textContent=fmtViewers(model.viewersCount);


  const ctrlEl = document.createElement('div'); ctrlEl.className='tile-controls';





  // Mute button


  const muteBtn = document.createElement('button');


  muteBtn.className = 'tile-btn'; muteBtn.textContent = '🔇'; muteBtn.title = 'Toggle audio';


  muteBtn.onclick = e => {


    e.stopPropagation();


    if (video.muted) { unmuteTile(tile, muteBtn); }


    else {


      video.muted = true; muteBtn.classList.remove('unmuted'); muteBtn.textContent = '🔇';


      tile.classList.remove('active-audio'); tile.style.order = '';


      document.getElementById('grid-wrapper').classList.remove('has-active-audio');


    }


  };





  // Favorite button


  const favBtn = document.createElement('button');

  updateFavBtn(favBtn, isFav(model.username));


  favBtn.onclick = e => { e.stopPropagation(); toggleFav(model.username, model); };





  // Fullscreen button


  const fsBtn = document.createElement('button');


  fsBtn.className = 'tile-btn'; fsBtn.textContent = '⛶'; fsBtn.title = 'Fullscreen';


  fsBtn.onclick = e => {
    e.stopPropagation();

    // --- FULLSCREEN ENTER: stop all other HLS loads, monopolize bandwidth ---
    const fsUsername = model.username;
    hlsInstances.forEach((h, uname) => {
      if (uname !== fsUsername) {
        try { h.stopLoad(); } catch(err) {}
      }
    });
    // Pause other videos visually too
    document.querySelectorAll('video').forEach(v => { if (v !== video) v.pause(); });

    // Boost buffer targets on the fullscreen tile
    const fsHls = hlsInstances.get(fsUsername);
    if (fsHls) {
      fsHls.config.maxBufferLength    = 60;
      fsHls.config.maxMaxBufferLength = 120;
      try { fsHls.startLoad(); } catch(err) {}
    }

    // --- FULLSCREEN EXIT: restore all HLS loads ---
    const onExit = () => {
      if (!document.fullscreenElement) {
        // Restore buffer targets on fullscreen tile
        if (fsHls) {
          fsHls.config.maxBufferLength    = 30;
          fsHls.config.maxMaxBufferLength = 60;
        }
        // Resume all other instances
        hlsInstances.forEach((h, uname) => {
          if (uname !== fsUsername) {
            try { h.startLoad(); } catch(err) {}
          }
        });
        // Resume video playback on visible tiles
        if (!allPaused) {
          document.querySelectorAll('video').forEach(v => {
            if (v !== video) v.play().catch(() => {});
          });
        }
        document.removeEventListener('fullscreenchange', onExit);
      }
    };

    document.addEventListener('fullscreenchange', onExit);
    (video.requestFullscreen || video.webkitRequestFullscreen).call(video);
  };





  ctrlEl.appendChild(muteBtn); ctrlEl.appendChild(favBtn); ctrlEl.appendChild(fsBtn);

async function loadCams(reset=true) {
  if (camLoading) return;
  camLoading = true;
  if (reset) { camOffset = 0; camAllLoaded = false; stopCamRefresh(); document.getElementById('grid').innerHTML = ''; }
  const sort    = document.getElementById('camSortSelect')?.value || 'active';
  const country = (document.getElementById('camCountryInput')?.value || '').trim().toLowerCase();
  const cols    = Math.round(Math.sqrt(parseInt(document.getElementById('gridSelect').value) || 4));
  if (reset) document.getElementById('statusText').textContent = 'Loading cams...';
  let cams = [];
  try {
    const res = await fetch(`${VISION_API}/cams?limit=100&offset=${camOffset}`, { headers: { 'X-API-Key': CAM_API_KEY } });
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    cams = data.cams || [];
  } catch(e) {
    document.getElementById('statusText').textContent = 'Cam API unavailable';
    camLoading = false; return;
  }
  if (country) cams = cams.filter(c => (c.country||'').toLowerCase().includes(country) || (c.city||'').toLowerCase().includes(country));
  if (sort === 'motion') cams.sort((a,b) => (b.motion_score||0) - (a.motion_score||0));
  else if (sort === 'recent') cams.sort((a,b) => (b.last_active||0) - (a.last_active||0));
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty-state');
  if (reset && !cams.length) { empty.style.display='flex'; empty.innerHTML='<div class="icon">no signal</div><div>No cams available.</div>'; camLoading=false; return; }
  empty.style.display = 'none';
  grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
  cams.forEach(cam => grid.appendChild(buildCamTile(cam)));
  camOffset += cams.length;
  if (cams.length < 100) camAllLoaded = true;
  const active = [...grid.querySelectorAll('.badge-status.active')].length;
  document.getElementById('statusText').textContent = camOffset + ' cams loaded \u00b7 ' + active + ' active \u00b7 ' + new Date().toLocaleTimeString();
  const bar = document.getElementById('refreshBar');
  bar.style.animation = 'none'; bar.offsetHeight; bar.style.animation = 'drain 60s linear forwards';
  clearTimeout(camRefreshTimer);
  camRefreshTimer = setTimeout(() => loadCams(true), 60000);
  camLoading = false;
}

function buildCamTile(cam) {

  const tile = document.createElement('div');

  tile.className = 'tile';

  const img = document.createElement('img');

  img.className = 'tile-cam-img';

  const isActive = cam.status === 'active';
  const snapBase = `${VISION_API}/cams/${cam.cam_id}/snapshot${isActive ? '?live=1' : ''}`;

  img.src = snapBase + (snapBase.includes('?') ? '&' : '?') + 't=' + Date.now();

  img.onerror = () => {
    img.style.display = 'none';
    const noSig = tile.querySelector('.cam-nosignal') || document.createElement('div');
    noSig.className = 'cam-nosignal';
    noSig.textContent = 'NO SIGNAL';
    if (!tile.querySelector('.cam-nosignal')) tile.insertBefore(noSig, tile.firstChild);
  };

  function _camInterval(motion) {
    if (motion > 20) return 2000;
    if (motion > 5)  return 5000;
    return 15000;
  }
  function _scheduleRefresh(id, el, base, motion) {
    camTileTimers[id] = setTimeout(function tick() {
      const sep = base.includes("?") ? "&" : "?";
      const next = `${base}${sep}t=${Date.now()}`;
      const probe = new Image();
      probe.onload = () => {
        el.src = next;
        fetch(`${VISION_API}/cams/${id}`, { headers: { 'X-API-Key': CAM_API_KEY } })
          .then(r => r.json())
          .then(d => { camTileTimers[id] = setTimeout(tick, _camInterval(d.motion_score || 0)); })
          .catch(()  => { camTileTimers[id] = setTimeout(tick, _camInterval(motion)); });
      };
      probe.onerror = () => { camTileTimers[id] = setTimeout(tick, 15000); };
      probe.src = next;
    }, _camInterval(motion));
  }
  _scheduleRefresh(cam.cam_id, img, snapBase, cam.motion_score || 0);

  const top = document.createElement('div'); top.className='tile-top';

  const badge = document.createElement('span');

  badge.className = `badge-status ${cam.status||'unknown'}`;

  badge.textContent = ({active:'ACTIVE',idle:'IDLE',unknown:'WAIT',dead:'DEAD'})[cam.status||'unknown']||'?';

  const loc = document.createElement('span'); loc.className='badge-hd';

  loc.textContent = [cam.country,cam.city].filter(Boolean).join(', ').slice(0,22)||'--';

  top.appendChild(badge); top.appendChild(loc);

  const bot = document.createElement('div'); bot.className='tile-bottom';

  const nameEl = document.createElement('div'); nameEl.className='tile-username';

  nameEl.textContent = cam.label||cam.cam_id;

  const motEl = document.createElement('div'); motEl.className='tile-viewers'; motEl.style.fontSize='9px';

  motEl.textContent = cam.motion_score>0 ? `${cam.motion_score.toFixed(1)}% motion` : 'idle';

  const ctrlEl = document.createElement('div'); ctrlEl.className='tile-controls';

  const fsBtn = document.createElement('button'); fsBtn.className='tile-btn'; fsBtn.textContent='?'; fsBtn.title='Fullscreen';

  fsBtn.onclick = e => { e.stopPropagation(); img.requestFullscreen?.(); };

  ctrlEl.appendChild(fsBtn); bot.appendChild(nameEl); bot.appendChild(motEl); bot.appendChild(ctrlEl);

  const bw = document.createElement('div'); bw.className='motion-bar-wrap';

  const bb = document.createElement('div'); bb.className='motion-bar'; bb.style.width=Math.min(100,cam.motion_score||0).toFixed(1)+'%';

  bw.appendChild(bb);

  tile.style.cursor='pointer';

  tile.onclick = e => { if(!e.target.closest('.tile-btn') && cam.page_url) window.open(cam.page_url,'_blank','noopener'); };

  tile.appendChild(img); tile.appendChild(top); tile.appendChild(bot); tile.appendChild(bw);

  return tile;

}

}
function applyMobileFilters() {
  const syncSelects = [['gridSelectM','gridSelect'],['genderSelectM','genderSelect'],
    ['sortSelectM','sortSelect'],['qualitySelectM','qualitySelect'],['countrySelectM','countrySelect']];
  syncSelects.forEach(([m,d]) => { const me=document.getElementById(m),de=document.getElementById(d); if(me&&de) de.value=me.value; });
  document.getElementById('tagInput').value = document.getElementById('tagInputM').value;
  const aff=document.getElementById('affId'); if(aff) aff.value=document.getElementById('affIdM').value;
  closeMobileFilters();
  loadStreams();
}
function resetMobileFilters() {
  document.getElementById('gridSelectM').value='4';
  document.getElementById('genderSelectM').value='female';
  document.getElementById('sortSelectM').value='viewersCount';
  document.getElementById('qualitySelectM').value='original';
  document.getElementById('countrySelectM').value='';
  document.getElementById('tagInputM').value='';
}

// ── MOBILE GRID COL CAP ───────────────────────────────────────────────────────
function getResponsiveCols() {
  const raw = Math.round(Math.sqrt(parseInt(document.getElementById('gridSelect').value)||4));
  const w = window.innerWidth;
  if (w <= 600)  return Math.min(raw, 2);
  if (w <= 900)  return Math.min(raw, 3);
  return raw;
}
const _renderGridOrig = renderGrid;
renderGrid = function() {
  _renderGridOrig();
  document.getElementById('grid').style.gridTemplateColumns = `repeat(${getResponsiveCols()}, 1fr)`;
};
window.addEventListener('resize', () => {
  const g = document.getElementById('grid');
  if (g) g.style.gridTemplateColumns = `repeat(${getResponsiveCols()}, 1fr)`;
});

// ── FULLSCREEN SWIPE MODE ─────────────────────────────────────────────────────
let _fsHls=null, _fsList=[], _fsIdx=0, _fsFavMode=false, _fsMuted=false;
let _fsTx=0, _fsTy=0, _fsSwiping=false;

function openFsOverlay(usernameOrModel, list, favMode) {
  _fsList    = list || currentFiltered;
  _fsFavMode = !!favMode;
  const uname = typeof usernameOrModel==='string' ? usernameOrModel : usernameOrModel.username;
  _fsIdx = _fsList.findIndex(m => m.username===uname);
  if (_fsIdx < 0) _fsIdx = 0;
  // Mute all grid tiles - fs takes over audio
  document.querySelectorAll('#grid video').forEach(v => { v.muted = true; v.pause(); });
  document.querySelectorAll('.tile-btn.unmuted').forEach(b => { b.classList.remove('unmuted'); b.textContent = '\uD83D\uDD07'; });
  document.querySelectorAll('.tile').forEach(t => t.classList.remove('active-audio'));
  document.getElementById('grid-wrapper').classList.remove('has-active-audio');
  _fsMuted = false;
  const ov = document.getElementById('fs-overlay');
  ov.classList.add('open');
  document.getElementById('fs-mode-badge').style.display = _fsFavMode ? 'inline-block' : 'none';
  ov.setAttribute('tabindex', '-1');
  ov.focus();
  _fsLoad();
}
// Overlay keydown - belt and suspenders in case document listener misses it
document.getElementById('fs-overlay').addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  { e.preventDefault(); _fsNav(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); _fsNav(1);  }
  if (e.key === 'Escape')     { e.preventDefault(); closeFsOverlay(); }
});

function closeFsOverlay() {
  document.getElementById('fs-overlay').classList.remove('open');
  if (_fsHls) { try{_fsHls.destroy();}catch(e){} _fsHls=null; }
  const v=document.getElementById('fs-video');
  v.pause(); v.src=''; v.removeAttribute('src');
  // Resume grid videos (muted)
  document.querySelectorAll('#grid video').forEach(v => { try { v.play().catch(()=>{}); } catch(e){} });
}
function _fsLoad() {
  const m=_fsList[_fsIdx]; if(!m) return;
  document.getElementById('fs-counter').textContent=`${_fsIdx+1} / ${_fsList.length}`;
  document.getElementById('fs-username').textContent=m.username;
  const vw=m.viewersCount?`\uD83D\uDC41 ${fmtViewers(m.viewersCount)}`:'';
  const co=m.country?`  ${getCountryFlag(m.country)} ${m.country.toUpperCase()}`:'';
  document.getElementById('fs-meta').textContent=vw+co;
  const favOn=isFav(m.username);
  const fb=document.getElementById('fs-fav-btn');
  fb.textContent=favOn?'\u2665':'\u2661'; fb.classList.toggle('fav-on',favOn);
  if (_fsHls){try{_fsHls.destroy();}catch(e){} _fsHls=null;}
  const v=document.getElementById('fs-video');
  v.pause(); v.src=''; v.removeAttribute('src');
  const q=document.getElementById('qualitySelect').value;
  const url=m.stream?.urls?.[q]||m.stream?.urls?.original||m.stream?.url;
  if(!url) return;
  v.muted=true;  // always start muted to satisfy autoplay policy, unmute after play starts
  if(Hls.isSupported()){
    _fsHls=new Hls({strictManifestParsing:false,maxBufferLength:30});
    _fsHls.loadSource(url); _fsHls.attachMedia(v);
    _fsHls.on(Hls.Events.MANIFEST_PARSED,()=>{
      v.play().then(()=>{ v.muted=_fsMuted; }).catch(()=>{});
    });
  } else if(v.canPlayType('application/vnd.apple.mpegurl')){
    v.src=url; v.play().then(()=>{ v.muted=_fsMuted; }).catch(()=>{});
  }
  document.getElementById('fs-mute-btn').textContent=_fsMuted?'\uD83D\uDD07':'\uD83D\uDD0A';
}
function _fsNav(dir) {
  const ni=_fsIdx+dir;
  if(ni<0||ni>=_fsList.length) return;
  const w=document.getElementById('fs-video-wrap');
  const cls=dir>0?'anim-left':'anim-right';
  w.classList.add(cls);
  setTimeout(()=>{ w.classList.remove(cls); _fsIdx=ni; _fsLoad(); }, 200);
}
function fsFavToggle() {
  const m=_fsList[_fsIdx]; if(!m) return;
  toggleFav(m.username,m);
  const on=isFav(m.username);
  const fb=document.getElementById('fs-fav-btn');
  fb.textContent=on?'\u2665':'\u2661'; fb.classList.toggle('fav-on',on);
}
function fsMuteToggle() {
  _fsMuted=!_fsMuted;
  document.getElementById('fs-video').muted=_fsMuted;
  document.getElementById('fs-mute-btn').textContent=_fsMuted?'\uD83D\uDD07':'\uD83D\uDD0A';
}

// Touch swipe handler
(function(){
  const ov=document.getElementById('fs-overlay');
  ov.addEventListener('touchstart',e=>{_fsTx=e.touches[0].clientX;_fsTy=e.touches[0].clientY;_fsSwiping=false;},{passive:true});
  ov.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-_fsTx, dy=e.touches[0].clientY-_fsTy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8) _fsSwiping=true;
  },{passive:true});
  ov.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-_fsTx, dy=e.changedTouches[0].clientY-_fsTy;
    if(Math.abs(dy)>90&&Math.abs(dy)>Math.abs(dx)){ closeFsOverlay(); return; }
    if(!_fsSwiping||Math.abs(dx)<40) return;
    _fsNav(dx<0?1:-1);
    _fsSwiping=false;
  },{passive:true});
  document.addEventListener('keydown',e=>{
    if(!document.getElementById('fs-overlay').classList.contains('open')) return;
    if(e.key==='ArrowRight') _fsNav(1);
    if(e.key==='ArrowLeft')  _fsNav(-1);
    if(e.key==='Escape')     closeFsOverlay();
  });
})();

// Tile interactions: mobile double-tap OR desktop double-click = fullscreen
const _btOrig = buildTile;
buildTile = function(model, quality) {
  const tile = _btOrig(model, quality);
  // Desktop: double-click opens fullscreen overlay
  tile.addEventListener('dblclick', e => {
    if (e.target.closest('.tile-btn, .cta-link')) return;
    openFsOverlay(model, currentFiltered, false);
  });
  if (window.innerWidth <= 900) {
    let tapTimer = null, tapCount = 0;
    tile.addEventListener('click', e => {
      if (e.target.closest('.tile-btn, .cta-link')) return;
      tapCount++;
      if (tapCount === 1) {
        tapTimer = setTimeout(() => {
          tapCount = 0;
          const existing = tile.querySelector('.mobile-meta-badge');
          if (existing) { existing.remove(); return; }
          document.querySelectorAll('.mobile-meta-badge').forEach(b => b.remove());
          const badge = document.createElement('div');
          badge.className = 'mobile-meta-badge';
          const viewers = model.viewersCount ? fmtViewers(model.viewersCount) : '';
          const flag = model.country ? getCountryFlag(model.country) : '';
          const ctry = model.country ? model.country.toUpperCase() : '';
          badge.innerHTML = '<span class="mmb-name">' + model.username + '</span>' +
            (viewers ? '<span class="mmb-viewers">👁 ' + viewers + '</span>' : '') +
            (flag    ? '<span class="mmb-country">' + flag + ' ' + ctry + '</span>' : '');
          tile.appendChild(badge);
          setTimeout(() => badge.remove(), 3000);
        }, 260);
      } else if (tapCount === 2) {
        clearTimeout(tapTimer); tapCount = 0;
        openFsOverlay(model, currentFiltered, false);
      }
    });
  }
  return tile;
};

// Wire fav panel item → FS swipe through favs on mobile
const _rfpOrig = renderFavPanel;
renderFavPanel = function() {
  _rfpOrig();
  if (window.innerWidth > 900) return;
  document.querySelectorAll('.fav-item').forEach(item => {
    const uname = item.querySelector('.fav-name')?.textContent;
    if (!uname) return;
    item.onclick = () => {
      const favList = Object.keys(getFavs())
        .map(u => allModels.find(m=>m.username===u))
        .filter(m => m && m.stream);
      if (!favList.length) return;
      toggleFavPanel();
      openFsOverlay(uname, favList, true);
    };
  });
};

</script>
