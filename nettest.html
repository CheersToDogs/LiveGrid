<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>LiveGrid Net Test</title>
<style>body{background:#111;color:#0f0;font-family:monospace;font-size:13px;padding:16px;line-height:1.5}
.bad{color:#f44}.ok{color:#0f0}.warn{color:#fa0}video{width:320px;height:240px;background:#000;border:1px solid #333;display:block;margin-top:10px}</style>
</head><body>
<h2>LiveGrid Network + Playback Test</h2>
<div id="log">Running...</div>
<video id="v" muted autoplay playsinline></video>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script>
const log = document.getElementById('log');
function L(msg, cls){ log.innerHTML += '<div class="'+(cls||'')+'">'+msg+'</div>'; }
(async () => {
  L('0. Probing CDN host reachability (no-cors)...');
  for (const host of ['https://edge-hls.saawsedge.com/','https://media-hls.saawsedge.com/','https://edge-hls.doppiocdn.com/']) {
    try {
      const t0 = performance.now();
      await fetch(host, {mode:'no-cors', cache:'no-store'});
      L('   reachable: '+host+' ('+Math.round(performance.now()-t0)+'ms)','ok');
    } catch(e) {
      L('   BLOCKED/UNREACHABLE: '+host+' — '+e.message,'bad');
    }
  }
  L('1. Fetching live model list from Stripchat API...');
  let master, model;
  try {
    const r = await fetch('https://go.stripchat.com/api/models?' + new URLSearchParams({
      limit:5, offset:0, sortBy:'viewersCount',
      'filters[gender][0]':'female','filters[isBroadcasting]':'true'
    }), {headers:{Accept:'application/json'}});
    L('   API status: '+r.status, r.ok?'ok':'bad');
    const d = await r.json();
    const ms = (d.models||d.data||[]).filter(m=>m.status==='public'&&m.stream&&m.stream.urls);
    L('   public models w/ stream: '+ms.length, ms.length?'ok':'bad');
    model = ms[0];
    master = model.stream.urls['240p'] || model.stream.urls['original'];
    L('   testing model: '+model.username);
    L('   master URL: '+master);
  } catch(e){ L('   API FETCH FAILED: '+e.message,'bad'); return; }

  L('2. Fetching master playlist directly...');
  try {
    const r = await fetch(master);
    L('   master status: '+r.status, r.ok?'ok':'bad');
    const txt = await r.text();
    const variant = (txt.match(/https:\/\/media-hls[^\s]+/)||[])[0];
    L('   variant URL: '+(variant||'NONE FOUND'), variant?'ok':'bad');
    if (variant) {
      L('3. Fetching variant (segment) playlist — THIS is what 403s...');
      const r2 = await fetch(variant);
      L('   variant status: '+r2.status, r2.ok?'ok':'bad');
      if (!r2.ok) L('   >>> 403/blocked = your IP cannot load segments. This is the problem. <<<','bad');
    }
  } catch(e){ L('   PLAYLIST FETCH FAILED (CORS or network): '+e.message,'warn'); }

  L('4. Trying actual hls.js playback...');
  const v = document.getElementById('v');
  if (Hls.isSupported()){
    const hls = new Hls({strictManifestParsing:false});
    hls.loadSource(master);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ L('   manifest parsed, playing...','ok'); v.play().catch(e=>L('   play() rejected: '+e.message,'warn')); });
    hls.on(Hls.Events.ERROR, (_,d)=>{ if(d.fatal) L('   HLS FATAL: '+d.type+' / '+d.details,'bad'); });
    v.addEventListener('playing', ()=>L('   >>> VIDEO IS PLAYING! readyState='+v.readyState+' <<<','ok'));
    v.addEventListener('canplay', ()=>L('   canplay fired, readyState='+v.readyState,'ok'));
    setTimeout(()=>{ L('5. After 8s: readyState='+v.readyState+' paused='+v.paused+' w='+v.videoWidth, v.videoWidth>0?'ok':'bad'); }, 8000);
  } else L('   hls.js NOT supported','bad');
})();
</script>
</body></html>
